<!DOCTYPE html>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<html class="dark">
    <head>
        <script src="https://cdn.tailwindcss.com"></script>
        <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
        <script>
            tailwind.config = {
                darkMode: 'class',
                theme: {
                    extend: {}
                }
            }
        </script>
        <style>
            :root { color-scheme: dark; }
            * { box-sizing: border-box; }
            body { font-family: Inter, sans-serif !important; background: #18191c !important; color: #e6e6e6; letter-spacing: 0; }
            .mono { font-family: 'JetBrains Mono', monospace; }
            .station-shell { max-width: 1120px; margin: 0 auto; padding: 20px 24px 48px; }
            .station-header { min-height: 48px; border-bottom: 1px solid #34363b; }
            .station-action { height: 30px; display: inline-flex; align-items: center; padding: 0 9px; border: 1px solid #3b3d42; background: #202125; color: #c6c7ca; font-size: 11px; }
            .station-action:hover { background: #2a2c30; color: white; }
            #chart-container { border: 1px solid #34363b; background: #202125; overflow-x: auto; padding-top: 8px; }
            #forecast-table { margin-top: 12px !important; margin-bottom: 24px !important; border: 1px solid #34363b; background: #202125; overflow-x: auto; }
            #forecast-table th { color: #8b8d93; font-size: 10px; font-weight: 600; padding: 10px 14px !important; }
            #forecast-table td { padding: 8px 14px !important; white-space: nowrap; }
            #tooltip { border-radius: 4px !important; background: #18191c !important; border-color: #45474d !important; }
            body.embedded .standalone-only { display: none !important; }
            body.embedded .station-shell { padding-top: 14px; }
            .page-favorite-button {
                width: 32px; height: 32px; display: inline-flex; flex: none; align-items: center; justify-content: center;
                border: 1px solid #406b53; background: #202125; color: #6fcf97;
                font-size: 18px; line-height: 1; cursor: pointer;
            }
            .page-favorite-button:hover { background: #2a2c30; }
            .page-favorite-button.is-favorite { color: #e06c75; border-color: #553137; background: #281f22; }
            @media (max-width: 767px) {
                .station-shell { padding: 12px; }
            }
        </style>
        <script>if (window.self !== window.top) document.addEventListener('DOMContentLoaded', () => document.body.classList.add('embedded'));</script>
    </head>

    <body>
      <main class="station-shell">
        <div class="station-header flex items-start justify-between gap-4 mb-4">
            <!-- Buoy Name -->
            <div class="w-full min-w-0">
                <h1 class="text-base font-semibold text-white truncate">{{.BuoyName}}</h1>
                <div class="mono text-[10px] text-[#8b8d93] mt-1">BUOY {{.SwellReport.StationId}} &middot; CURRENT CONDITIONS</div>
            </div>

            <button type="button" class="page-favorite-button" data-forecast-favorite data-favorite-type="buoy" data-favorite-id="{{.SwellReport.StationId}}" aria-label="Add to favorites">+</button>
        </div>

        <div class="flex items-center justify-between mb-2">
            <div class="text-[10px] font-semibold uppercase text-[#8b8d93]">Current report</div>
            {{if gt (len .ForecastSummary) 0}}
                {{$current := index .ForecastSummary 0}}
                <div class="flex items-center gap-2">
                    <span class="text-[10px] text-[#8b8d93]">Current outlook</span>
                    <span data-current-outlook class="px-2 py-1 text-[10px] font-semibold uppercase border"
                          style="color: {{if eq $current.Condition "good"}}#6fcf97{{else if eq $current.Condition "fair"}}#e2b86b{{else}}#e06c75{{end}}; border-color: currentColor; background: color-mix(in srgb, currentColor 10%, transparent);">
                        {{$current.Condition}}
                    </span>
                </div>
            {{end}}
        </div>
        <div class="current-report">{{template "report" .}}</div>
        {{template "forecast" .}}
        {{template "favoritecontrol" .}}
      </main>
    </body>
</html>
