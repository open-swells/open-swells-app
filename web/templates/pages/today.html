                    document.querySelectorAll(`.favorite-btn[data-spot-id="${CSS.escape(spotId)}"]`)
                        .forEach(updateFavoriteButton);
                } catch (error) {
                    console.error('Error:', error);
                    alert(`Failed to ${isFavorite ? 'remove' : 'add'} favorite`);
                }
                updateFavoritesMenuCount();
                await loadForecastSummary();
            }


            // Stations reporting spectral wave data, refreshed daily from
            // NDBC by the server (see stations.go). Markers and search stay
            // empty until the list arrives.
            let currentBuoy = {};
            let buoyData = [];
            let spotData = []; // surf spots from /api/spots, feeds search

            async function loadBuoyStations() {
                try {
                    const response = await fetch('/api/buoys');
                    if (!response.ok) throw new Error(`${response.status} from /api/buoys`);
                    buoyData = await response.json();
                    plotBuoys();
                } catch (error) {
                    console.error('Failed to load station list:', error);
                }
            }

            const searchInput = document.getElementById('searchInput');

            // Compact search overlay: below the full-header breakpoint the inline bar
            // is CSS-hidden and this class turns it into a centered modal.
            function openMobileSearch() {
                document.getElementById('searchBox').classList.add('mobile-open');
                searchInput.focus();
            }
            function closeMobileSearch() {
                const box = document.getElementById('searchBox');
                if (!box.classList.contains('mobile-open')) return;
                box.classList.remove('mobile-open');
                searchInput.value = '';
                document.getElementById('searchResults').innerHTML = '';
                searchInput.blur();
            }
            document.getElementById('searchBox').addEventListener('click', (e) => {
                if (e.target.id === 'searchBox') closeMobileSearch();
            });
            window.addEventListener('resize', () => {
                if (window.matchMedia('(min-width: 1400px)').matches) closeMobileSearch();
            });

            // Search covers buoys and surf spots; each result is tagged with
            // its kind. Spots dominate by count (~6k), so buoys list first
            // and the total is capped.
            const SEARCH_RESULT_LIMIT = 20;
            searchInput.addEventListener('input', function(e) {
                const searchTerm = e.target.value.trim().toLowerCase();
                if (!searchTerm) {
                    document.getElementById('searchResults').innerHTML = '';
                    return;
                }
                const buoyMatches = buoyData
                    .filter(buoy => buoy.name.toLowerCase().includes(searchTerm) || buoy.stationId.toLowerCase().includes(searchTerm))
                    .map(buoy => ({ type: 'buoy', id: buoy.stationId, name: buoy.name, sub: buoy.stationId, lat: buoy.latitude, lon: buoy.longitude, buoy }));
                const spotMatches = spotData
                    .filter(s => s.name.toLowerCase().includes(searchTerm) || (s.region || '').toLowerCase().includes(searchTerm))
                    .map(s => ({ type: 'spot', id: s.id, name: s.name, sub: s.region || '', lat: s.lat, lon: s.lon, region: s.region || '' }));
                displayMatches([...buoyMatches, ...spotMatches].slice(0, SEARCH_RESULT_LIMIT));
            });

            // "/" focuses the search from anywhere; Escape clears and blurs it
            document.addEventListener('keydown', (e) => {
                if (e.key === '/' && document.activeElement !== searchInput &&
                    !['INPUT', 'TEXTAREA'].includes(document.activeElement.tagName)) {
                    e.preventDefault();
                    if (window.matchMedia('(max-width: 1399px)').matches) openMobileSearch();
                    else searchInput.focus();
                } else if (e.key === 'Escape') {
                    closeMobileSearch();
                    if (document.activeElement === searchInput) {
                        searchInput.value = '';
                        document.getElementById('searchResults').innerHTML = '';
                        searchInput.blur();
                    }
                }
            });

            function displayMatches(matches) {
                const searchResults = document.getElementById('searchResults');
                searchResults.innerHTML = ''; // Clear previous results

                if (!matches.length) {
                    const empty = document.createElement('div');
                    empty.className = 'px-3 py-2.5 text-xs text-[#8b8d93]';
                    empty.textContent = 'No matches found';
                    searchResults.appendChild(empty);
                    return;
                }

                const esc = s => String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;');
                matches.forEach(match => {
                    const div = document.createElement('div');
                    div.className = 'flex items-center justify-between gap-3 px-3 py-2 cursor-pointer border-b border-[#26272b] last:border-b-0 hover:bg-[#2a2c30]';
                    const badge = match.type === 'buoy'
                        ? '<span class="search-badge search-badge-buoy shrink-0">Buoy</span>'
                        : '<span class="search-badge search-badge-beach shrink-0">Beach</span>';
                    div.innerHTML =
                        `<span class="text-[13px] text-[#d6d7da] truncate">${esc(match.name)}</span>` +
                        `<span class="flex items-center gap-2 shrink-0 max-w-[55%]">${badge}` +
                        `<span class="mono text-[10px] text-[#8b8d93] truncate">${esc(match.sub)}</span></span>`;
                    div.onclick = function () {
                        searchResults.innerHTML = '';
                        searchInput.value = match.name;
                        closeMobileSearch();

                        if (match.type === 'buoy') {
                            currentBuoy = match.buoy;
                            const marker = popupMap.get(match.id);
                            if (marker) {
                                marker.togglePopup();
                                map.flyTo({
                                    center: [match.lon, match.lat],
                                    zoom: 4,
                                    offset: [0, -100], // Offset to account for the popup
                                });
                            } else {
                                console.warn(`No marker found for stationId: ${match.id}`);
                            }
                            return;
                        }

                        // Spots have no DOM marker: fly in past the cluster
                        // zoom and open the popup directly.
                        map.flyTo({ center: [match.lon, match.lat], zoom: 9.5, offset: [0, -100] });
                        new maplibregl.Popup({ offset: 10, maxWidth: '280px' })
                            .setLngLat([match.lon, match.lat])
                            .setHTML(spotPopupHTML({ id: match.id, name: match.name, region: match.region }))
                            .addTo(map);
                    };
                    searchResults.appendChild(div);
                });
            }



            // Clicking outside the search box hides the results
            window.addEventListener('click', function(e) {
                if (!document.getElementById('searchBox').contains(e.target)) {
                    document.getElementById('searchResults').innerHTML = '';
                }
            });

            //center the map
            map.setCenter([-119.069824, 33.101608]);
            map.setZoom(3);

            // --- Tide stations (NOAA CO-OPS, from tides.json) ------------
            // tides.json: { stations: [{ id, name, lat, lon, predictions:
            // [{t, v}], observations: [{t, v}] }], errors: [...] }. Heights
            // are meters MLLW, timestamps UTC. Absent file = no tide layer.
            function tideDate(t) {
                return new Date(t.replace(' ', 'T') + 'Z');
            }

            const M_TO_FT = 3.28084;

            function tidePopupHTML(st) {
                const now = Date.now();
                const preds = (st.predictions || []).map(e => ({ t: tideDate(e.t).getTime(), v: parseFloat(e.v) }));
                const obs = (st.observations || []).map(e => ({ t: tideDate(e.t).getTime(), v: parseFloat(e.v) }));

                let html = `<div class="w-[250px]">
                    <div class="text-[13px] font-medium text-white leading-snug mb-1 pr-4">${st.name || 'Tide station'}</div>
                    <div class="mono text-[10px] text-[#8b8d93] mb-2">TIDE ${st.id} &middot; MLLW</div>`;

                if (preds.length < 2) {
                    return html + '<div class="text-xs text-[#8b8d93]">No predictions available.</div></div>';
                }

                // current level + trend from the two predictions around now
                let i = preds.findIndex(p => p.t > now);
                if (i < 1) i = 1;
                const before = preds[i - 1], after = preds[Math.min(i, preds.length - 1)];
                const frac = after.t > before.t ? (now - before.t) / (after.t - before.t) : 0;
                const level = before.v + (after.v - before.v) * Math.max(0, Math.min(1, frac));
                const rising = after.v >= before.v;

                // next local extremum after now
                let extremum = null;
                for (let k = Math.max(i, 1); k < preds.length - 1; k++) {
                    const isMax = preds[k].v >= preds[k - 1].v && preds[k].v >= preds[k + 1].v;
                    const isMin = preds[k].v <= preds[k - 1].v && preds[k].v <= preds[k + 1].v;
                    if (preds[k].t > now && (isMax || isMin)) {
                        extremum = { ...preds[k], kind: isMax ? 'High' : 'Low' };
                        break;
                    }
                }
                const fmtTime = new Intl.DateTimeFormat(undefined, { weekday: 'short', hour: 'numeric', minute: '2-digit' });
                html += `<div class="text-xs text-white font-semibold">${(level * M_TO_FT).toFixed(1)} ft &middot; ${rising ? 'rising' : 'falling'}</div>`;
                if (extremum) {
                    html += `<div class="text-[11px] text-[#a7a9ae] mt-0.5">${extremum.kind} ${(extremum.v * M_TO_FT).toFixed(1)} ft at ${fmtTime.format(new Date(extremum.t))}</div>`;
                }

                // sparkline: last 24h observed (gray) + next 48h predicted (teal)
                const t0 = now - 24 * 3600e3, t1 = now + 48 * 3600e3;
                const window_ = { obs: obs.filter(p => p.t >= t0 && p.t <= now), preds: preds.filter(p => p.t >= t0 && p.t <= t1) };
                const all = window_.obs.concat(window_.preds);
                if (all.length > 1) {
                    const W = 250, H = 56, PAD = 4;
                    const vMin = Math.min(...all.map(p => p.v)), vMax = Math.max(...all.map(p => p.v));
                    const xOf = t => ((t - t0) / (t1 - t0)) * W;
                    const yOf = v => vMax === vMin ? H / 2 : PAD + (1 - (v - vMin) / (vMax - vMin)) * (H - 2 * PAD);
                    const line = pts => pts.map((p, j) => `${j ? 'L' : 'M'}${xOf(p.t).toFixed(1)} ${yOf(p.v).toFixed(1)}`).join(' ');
                    const nowX = xOf(now).toFixed(1);
                    html += `<svg width="${W}" height="${H}" class="mt-2" style="display:block;">
                        <line x1="${nowX}" y1="0" x2="${nowX}" y2="${H}" stroke="#5e6ad2" stroke-dasharray="3,3"/>
                        ${window_.obs.length > 1 ? `<path d="${line(window_.obs.filter((_, j) => j % 5 === 0))}" fill="none" stroke="#8b8d93" stroke-width="1"/>` : ''}
                        <path d="${line(window_.preds)}" fill="none" stroke="#15a3a3" stroke-width="1.5"/>
                        <circle cx="${nowX}" cy="${yOf(level).toFixed(1)}" r="2.5" fill="#fff"/>
                    </svg>
                    <div class="mono text-[9px] text-[#6f7177] mt-1">-24H &middot; NOW &middot; +48H</div>`;
                }
                return html + '</div>';
            }

            async function loadTideStations() {
                try {
                    const response = await fetch('/static/tides.json');
                    if (!response.ok) return; // older pipeline run: no tides
                    const payload = await response.json();
                    for (const st of payload.stations || []) {
                        if (typeof st.lat !== 'number' || typeof st.lon !== 'number') continue;
                        const el = document.createElement('div');
                        el.className = 'tide-marker';
                        el.title = `${st.name || st.id} tide station`;
                        const dot = document.createElement('div');
                        dot.className = 'tide-marker-dot';
                        el.appendChild(dot);

                        const popup = new maplibregl.Popup({ offset: 12, maxWidth: '300px' });
                        // Build the popup lazily so "now" is fresh on open
                        popup.on('open', () => popup.setHTML(tidePopupHTML(st)));
                        new maplibregl.Marker({ element: el })
                            .setLngLat([st.lon, st.lat])
                            .setPopup(popup)
                            .addTo(map);
                    }
                } catch (error) {
                    console.warn('Tide stations unavailable:', error);
                }
            }

            // --- Surf zones: NWS beach forecasts (/api/beaches) -----------
            // A green marker at each zone's centroid. Clicking opens the
            // parsed SRF report in a popup and outlines that one zone; the
            // outline clears when the popup closes, so only the selected
            // zone is ever drawn.
            const RIP_COLORS = { low: '#6fcf97', moderate: '#e2b86b', high: '#e06c75' };
            const ripColor = risk => RIP_COLORS[(risk || '').toLowerCase().split(' ')[0]] || '#8b8d93';

            function ensureSurfOutlineLayer() {
                if (map.getSource('surf-zone-outline')) return;
                map.addSource('surf-zone-outline', { type: 'geojson', data: EMPTY_FC });
                map.addLayer({
                    id: 'surf-zone-outline-line',
                    type: 'line',
                    source: 'surf-zone-outline',
                    paint: { 'line-color': '#6fcf97', 'line-width': 2, 'line-opacity': 0.9 }
                });
            }
            function showSurfOutline(geometry) {
                ensureSurfOutlineLayer();
                map.getSource('surf-zone-outline').setData({ type: 'Feature', geometry, properties: {} });
            }
            function clearSurfOutline() {
                const src = map.getSource('surf-zone-outline');
                if (src) src.setData(EMPTY_FC);
            }

            function surfPopupHTML(zone, detail) {
                const escAttr = s => String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;');
                // name goes through a data attribute so quotes in zone names
                // can't break out of the inline handler
                const actions = `
                    <div class="buoy-popup-actions" style="margin-top: 10px;">
                        <button class="toolbar-button" data-zone="${zone.zoneId}" data-name="${escAttr(zone.zoneName)}"
                            onclick="openBeach(this.dataset.zone, this.dataset.name)">Full forecast</button>
                    </div>`;
                let html = `
                <div class="buoy-popup">
                    <div class="buoy-popup-name">${zone.zoneName}</div>
                    <div class="buoy-popup-meta"><span class="search-badge search-badge-beach">Beach</span><span class="buoy-popup-id">${zone.zoneId} &middot; NWS ${zone.office}</span></div>`;
                if (!detail) {
                    return html + '<div class="surf-popup-loading">Loading forecast&hellip;</div>' + actions + '</div>';
                }
                for (const h of detail.headlines || []) {
                    html += `<div class="surf-popup-headline">${h}</div>`;
                }
                detail.periods.slice(0, 3).forEach((p, i) => {
                    html += `<div class="surf-popup-period">
                        <div class="surf-popup-period-name">${p.name}</div>`;
                    if (p.ripRisk) html += `<div class="surf-popup-row"><span class="k">Rip current</span><span class="v" style="color: ${ripColor(p.ripRisk)};">${p.ripRisk}</span></div>`;
                    if (p.surfHeight) html += `<div class="surf-popup-row"><span class="k">Surf</span><span class="v">${p.surfHeight}</span></div>`;
                    if (p.waterTemp) html += `<div class="surf-popup-row"><span class="k">Water</span><span class="v">${p.waterTemp}</span></div>`;
                    if (p.winds) html += `<div class="surf-popup-row"><span class="k">Wind</span><span class="v">${p.winds}</span></div>`;
                    if (p.remarks && !/^none\.?$/i.test(p.remarks)) {
                        html += `<div class="surf-popup-remarks">${p.remarks}</div>`;
                    }
                    // tides get long; show them for the first period only
                    if (i === 0 && p.tides && p.tides.length) {
                        html += `<div class="surf-popup-tides">${p.tides.slice(0, 4).join('<br>')}</div>`;
                    }
                    html += '</div>';
                });
                return html + actions + '</div>';
            }

            const surfZoneDetails = new Map();
            async function surfZoneDetail(zoneId) {
                if (surfZoneDetails.has(zoneId)) return surfZoneDetails.get(zoneId);
                try {
                    const response = await fetch(`/api/beach/${encodeURIComponent(zoneId)}`);
                    if (!response.ok) return null;
                    const detail = await response.json();
                    surfZoneDetails.set(zoneId, detail);
                    return detail;
                } catch (error) {
                    console.warn('Surf zone detail unavailable:', error);
                    return null;
                }
            }

            async function loadSurfZones() {
                try {
                    const response = await fetch('/api/beaches');
                    if (!response.ok) return;
                    const zones = await response.json();
                    for (const z of zones) {
                        if (typeof z.lat !== 'number' || typeof z.lon !== 'number') continue;
                        const el = document.createElement('div');
                        el.className = 'surf-marker';
                        el.title = `${z.zoneName} beach forecast`;
                        const dot = document.createElement('div');
                        dot.className = 'surf-marker-dot';
                        el.appendChild(dot);

                        const popup = new maplibregl.Popup({ offset: 12, maxWidth: '300px' });
                        popup.on('open', async () => {
                            popup.setHTML(surfPopupHTML(z, null));
                            const detail = await surfZoneDetail(z.zoneId);
                            if (!popup.isOpen()) return;
                            if (detail) {
                                popup.setHTML(surfPopupHTML(z, detail));
                                if (detail.geometry) showSurfOutline(detail.geometry);
                            }
                        });
                        popup.on('close', clearSurfOutline);
                        new maplibregl.Marker({ element: el })
                            .setLngLat([z.lon, z.lat])
                            .setPopup(popup)
                            .addTo(map);
                    }
                } catch (error) {
                    console.warn('Surf zones unavailable:', error);
                }
            }

            // --- Surf spots: ~6k named breaks (/api/spots) ----------------
            // Too many for DOM markers, so they render as a clustered WebGL
            // circle layer. Clicking a spot opens a popup whose button loads
            // the model forecast page in the shared modal iframe.
            const SPOT_COLOR = '#f0a05a';

            function spotPopupHTML(p) {
                const esc = s => String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/"/g, '&quot;');
                return `
                <div class="buoy-popup">
                    <div class="buoy-popup-name">${esc(p.name)}</div>
                    <div class="buoy-popup-meta"><span class="search-badge search-badge-beach">Beach</span><span class="buoy-popup-id">${esc(p.region || 'SURF SPOT')}</span></div>
                    <div class="buoy-popup-actions">
                        <button class="toolbar-button" data-spot="${esc(p.id)}" data-name="${esc(p.name)}" data-region="${esc(p.region || '')}"
                            onclick="openSpot(this.dataset.spot, this.dataset.name, this.dataset.region)">Report &amp; forecast</button>
                        <button class="favorite-btn" data-spot-id="${esc(p.id)}"
                            onclick="toggleSpotFavorite(this.dataset.spotId)"></button>
                    </div>
                </div>`;
            }

            function showFavoriteOnMap(kind, id, lon, lat) {
                closeFavorites();
                if (!Number.isFinite(lon) || !Number.isFinite(lat)) return;
                map.flyTo({ center: [lon, lat], zoom: kind === 'spot' ? 9.5 : 6, offset: [0, -90] });

                if (kind === 'buoy') {
                    const marker = popupMap.get(id);
                    if (marker && marker.getPopup() && !marker.getPopup().isOpen()) marker.togglePopup();
                    return;
                }

                const spot = spotData.find(item => item.id === id);
                if (!spot) return;
                new maplibregl.Popup({ offset: 10, maxWidth: '280px' })
                    .setLngLat([lon, lat])
                    .setHTML(spotPopupHTML(spot))
                    .addTo(map);
            }

            function addSpotLayers(fc) {
                if (map.getSource('surf-spots')) return;
                map.addSource('surf-spots', {
                    type: 'geojson', data: fc,
                    cluster: true, clusterMaxZoom: 8, clusterRadius: 42
                });
                map.addLayer({
                    id: 'spot-clusters', type: 'circle', source: 'surf-spots',
                    filter: ['has', 'point_count'],
                    paint: {
                        'circle-color': SPOT_COLOR,
                        'circle-opacity': 0.8,
                        'circle-radius': ['step', ['get', 'point_count'], 9, 25, 13, 100, 17],
                        'circle-stroke-width': 1.5,
                        'circle-stroke-color': 'rgba(255, 255, 255, 0.9)'
                    }
                });
                map.addLayer({
                    id: 'spot-points', type: 'circle', source: 'surf-spots',
                    filter: ['!', ['has', 'point_count']],
                    paint: {
                        'circle-color': SPOT_COLOR,
                        'circle-radius': 5,
                        'circle-stroke-width': 1.5,
                        'circle-stroke-color': 'rgba(255, 255, 255, 0.95)'
                    }
                });
                // Cluster counts reuse a font the basemap style already
                // loads, since only its own glyphs are guaranteed to exist.
                const symbolLayer = map.getStyle().layers.find(
                    l => l.type === 'symbol' && l.layout && l.layout['text-font']);
                if (symbolLayer) {
                    map.addLayer({
                        id: 'spot-cluster-count', type: 'symbol', source: 'surf-spots',
                        filter: ['has', 'point_count'],
                        layout: {
                            'text-field': ['get', 'point_count_abbreviated'],
                            'text-font': symbolLayer.layout['text-font'],
                            'text-size': 10,
                            'text-allow-overlap': true
                        },
                        paint: { 'text-color': '#1b1c1f' }
                    });
                }

                map.on('click', 'spot-clusters', (e) => {
                    const f = map.queryRenderedFeatures(e.point, { layers: ['spot-clusters'] })[0];
                    if (!f) return;
                    map.easeTo({ center: f.geometry.coordinates, zoom: map.getZoom() + 2 });
                });
                map.on('click', 'spot-points', (e) => {
                    const f = e.features && e.features[0];
                    if (!f) return;
                    new maplibregl.Popup({ offset: 10, maxWidth: '280px' })
                        .setLngLat(f.geometry.coordinates.slice())
                        .setHTML(spotPopupHTML(f.properties))
                        .addTo(map);
                });
                for (const layer of ['spot-clusters', 'spot-points']) {
                    map.on('mouseenter', layer, () => { map.getCanvas().style.cursor = 'pointer'; });
                    map.on('mouseleave', layer, () => { map.getCanvas().style.cursor = ''; });
                }
            }

            async function loadSurfSpots() {
                try {
                    const response = await fetch('/api/spots');
                    if (!response.ok) return;
                    const spots = await response.json();
                    spotData = spots;
                    const fc = {
                        type: 'FeatureCollection',
                        features: spots
                            .filter(s => typeof s.lat === 'number' && typeof s.lon === 'number')
                            .map(s => ({
                                type: 'Feature',
                                geometry: { type: 'Point', coordinates: [s.lon, s.lat] },
                                properties: { id: s.id, name: s.name, region: s.region || '' }
                            }))
                    };
                    if (map.isStyleLoaded()) addSpotLayers(fc);
                    else map.once('load', () => addSpotLayers(fc));
                } catch (error) {
                    console.warn('Surf spots unavailable:', error);
                }
            }

            loadBuoyStations();
            loadTideStations();
            loadSurfZones();
            loadSurfSpots();
        </script>


</html>
