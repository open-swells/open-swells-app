<!DOCTYPE html>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<html class="dark">
    <head>


        <title>OpenSwells;</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <script>
            tailwind.config = {
                darkMode: 'class',
                theme: {
                    extend: {}
                }
            }
        </script>
        <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap');
        

        :root { color-scheme: dark; }
        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif !important; background: #0f1012; color: #e6e6e6; overflow: hidden; }
        /* h-screen is 100vh, which extends under mobile browser chrome and
           hides the bottom controls; the dynamic viewport unit tracks the
           real visible height. */
        body.h-screen { height: 100dvh; }
        /* MapLibre adds .maplibregl-map (position: relative) to the container,
           which defeats Tailwind's absolute/inset-0 — size it explicitly. */
        #map { width: 100%; height: 100%; }
        button, input { letter-spacing: 0; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .surface { background: rgba(24, 25, 28, .96); border: 1px solid #34363b; box-shadow: 0 12px 30px rgba(0,0,0,.24); }
        .icon-button { width: 32px; height: 32px; display: inline-flex; align-items: center; justify-content: center; border: 1px solid transparent; color: #a7a9ae; }
        .icon-button:hover { color: #fff; background: #2a2c30; border-color: #3b3d42; }
        .toolbar-button { height: 32px; display: inline-flex; align-items: center; gap: 7px; padding: 0 10px; border: 1px solid #3b3d42; background: #202125; color: #d6d7da; font-size: 12px; font-weight: 500; }
        .toolbar-button:hover, .toolbar-button[aria-expanded="true"] { background: #2a2c30; color: #fff; }
        .top-menu { min-height: 44px; padding: 5px; gap: 3px; }
        .top-menu .toolbar-button { height: 34px; padding-inline: 11px; }
        .favorites-menu-button { background: #24252a; border: 1px solid #3b3d42; }
        .favorites-menu-button svg { color: #8f9bff; }
        .favorites-menu-count { min-width: 17px; height: 17px; padding: 0 4px; display: inline-flex; align-items: center; justify-content: center; background: #343650; color: #c8ceff; font-family: 'JetBrains Mono', monospace; font-size: 9px; }
        .view-switch { width: 162px; height: 36px; padding: 4px; }
        .view-switch a { width: 76px; height: 28px; flex: none; }
        #signInBtn.is-user { width: 32px; padding: 0; border: 0; background: transparent; }
        .drawer-tools { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); border-bottom: 1px solid #34363b; }
        .drawer-tool { min-width: 0; height: 42px; display: flex; align-items: center; justify-content: center; gap: 6px; color: #a7a9ae; font-size: 11px; }
        .drawer-tool + .drawer-tool { border-left: 1px solid #34363b; }
        .drawer-tool:hover { color: #fff; background: #24252a; }
        .compact-only { display: none; }
        /* Buoy popup card. Styled with plain CSS rather than runtime
           Tailwind utility classes so the buttons hold their size and
           layout everywhere, including mobile. */
        .buoy-popup { width: min(230px, calc(100vw - 56px)); }
        .buoy-popup-name { margin: 0 28px 4px 0; font-size: 13px; font-weight: 500; line-height: 1.375; color: #fff; overflow-wrap: break-word; }
        .buoy-popup-id { margin-bottom: 12px; font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #8b8d93; }
        .buoy-popup-meta { margin-bottom: 12px; display: flex; align-items: center; gap: 7px; }
        .buoy-popup-meta .buoy-popup-id { margin-bottom: 0; }
        .buoy-popup-actions { display: flex; gap: 6px; }
        .buoy-popup-actions .toolbar-button { height: 40px; flex: 1; justify-content: center; }
        .favorite-btn {
            width: 40px; height: 40px; flex: none;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; font-weight: 600; line-height: 1;
            border: 1px solid #3b3d42; background: #202125; color: #6fcf97;
        }
        .favorite-btn:hover { background: #34363b; }
        .favorite-btn.is-favorite { color: #e06c75; }
        /* Search result kind badges: buoy indigo, beach (surf spot) sand */
        .search-badge {
            font-size: 9px; font-weight: 600; text-transform: uppercase;
            padding: 1px 5px; border: 1px solid currentColor; line-height: 14px;
        }
        .search-badge-buoy { color: #8e97e8; }
        .search-badge-beach { color: #f0a05a; }
        #favoritesView {
            width: min(460px, calc(100vw - 24px));
            min-height: 0;
            bottom: calc(0.75rem + env(safe-area-inset-bottom, 0px));
            display: flex;
            flex-direction: column;
            transform: translateX(calc(100% + 24px));
            transition: transform 180ms ease;
        }
        #favoritesView.is-open { transform: translateX(0); }
        #drawerBackdrop { opacity: 0; pointer-events: none; transition: opacity 180ms ease; }
        #drawerBackdrop.is-open { opacity: 1; pointer-events: auto; }
        #forecastModal { opacity: 0; pointer-events: none; transition: opacity 150ms ease; }
        #forecastModal.is-open { opacity: 1; pointer-events: auto; }
        #forecastDialog { transform: translateY(8px) scale(.99); transition: transform 150ms ease; }
        #forecastModal.is-open #forecastDialog { transform: translateY(0) scale(1); }
        .maplibregl-popup { font-family: 'Inter', sans-serif; }
        .maplibregl-popup-content { background: #18191c !important; color: #e6e6e6; border: 1px solid #3b3d42; border-radius: 0 !important; padding: 12px !important; box-shadow: 0 12px 30px rgba(0,0,0,.35) !important; }
        .maplibregl-popup-anchor-bottom .maplibregl-popup-tip,
        .maplibregl-popup-anchor-bottom-left .maplibregl-popup-tip,
        .maplibregl-popup-anchor-bottom-right .maplibregl-popup-tip { border-top-color: #3b3d42 !important; }
        .maplibregl-popup-anchor-top .maplibregl-popup-tip,
        .maplibregl-popup-anchor-top-left .maplibregl-popup-tip,
        .maplibregl-popup-anchor-top-right .maplibregl-popup-tip { border-bottom-color: #3b3d42 !important; }
        .maplibregl-popup-anchor-left .maplibregl-popup-tip { border-right-color: #3b3d42 !important; }
        .maplibregl-popup-anchor-right .maplibregl-popup-tip { border-left-color: #3b3d42 !important; }
        .maplibregl-popup-close-button {
            top: 2px; right: 2px;
            width: 34px; height: 34px;
            display: flex; align-items: center; justify-content: center;
            color: #8b8d93; font-size: 20px; line-height: 1;
            border-radius: 0;
        }
        .maplibregl-popup-close-button:hover { color: #fff; background: #2a2c30; }
        input[type="range"] { accent-color: #5e6ad2; }
        /* iOS Safari auto-zooms the page when a focused input's font-size
           is under 16px; keep the search at 16px on touch devices so
           focusing it never zooms */
        @media (pointer: coarse) {
            #searchInput { font-size: 16px; }
        }
        /* MapLibre positions the outer .buoy-marker with an inline transform
           every frame, so the visual dot lives on an inner element — never
           put transforms or transitions on the outer one. */
        .buoy-marker {
            width: 16px; height: 16px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }
        .buoy-marker-dot {
            width: 12px; height: 12px;
            border-radius: 50%;
            background: #5e6ad2;
            border: 2px solid rgba(255, 255, 255, 0.95);
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.45);
            transition: transform 120ms ease, background 120ms ease;
        }
        .buoy-marker:hover .buoy-marker-dot {
            transform: scale(1.35);
            background: #6d78de;
        }
        /* Tide stations: teal diamonds, distinct from the indigo buoy dots.
           Same outer/inner split as .buoy-marker (MapLibre owns the outer
           element's transform). */
        .tide-marker {
            width: 16px; height: 16px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }
        .tide-marker-dot {
            width: 9px; height: 9px;
            background: #15a3a3;
            border: 2px solid rgba(255, 255, 255, 0.95);
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.45);
            transform: rotate(45deg);
            transition: transform 120ms ease, background 120ms ease;
        }
        .tide-marker:hover .tide-marker-dot {
            transform: rotate(45deg) scale(1.35);
            background: #1fc2c2;
        }
        /* Surf zones: green squares at each zone's centroid, distinct from
           the indigo buoy dots and teal tide diamonds. Clicking one outlines
           its zone boundary on the map. */
        .surf-marker {
            width: 16px; height: 16px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }
        .surf-marker-dot {
            width: 10px; height: 10px;
            background: #6fcf97;
            border: 2px solid rgba(255, 255, 255, 0.95);
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.45);
            transition: transform 120ms ease, background 120ms ease;
        }
        .surf-marker:hover .surf-marker-dot {
            transform: scale(1.35);
            background: #8adcac;
        }
        /* Surf zone popup: the SRF report itself (no separate page) */
        .surf-popup-headline {
            margin: 0 0 6px; padding: 2px 6px;
            border: 1px solid #e2b86b; color: #e2b86b;
            font-size: 9px; font-weight: 600; text-transform: uppercase;
        }
        .surf-popup-period { border-top: 1px solid #34363b; padding: 6px 0 7px; }
        .surf-popup-period-name {
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px; font-weight: 600; color: #8b8d93;
            text-transform: uppercase; margin-bottom: 3px;
        }
        .surf-popup-row { display: flex; justify-content: space-between; gap: 12px; font-size: 11px; line-height: 1.7; }
        .surf-popup-row .k { color: #8b8d93; flex: none; }
        .surf-popup-row .v { color: #e6e6e6; text-align: right; }
        .surf-popup-remarks { font-size: 10px; color: #a7a9ae; margin-top: 3px; }
        .surf-popup-tides { margin-top: 4px; font-family: 'JetBrains Mono', monospace; font-size: 9px; color: #8b8d93; line-height: 1.6; }
        .surf-popup-loading { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #8b8d93; }
        /* Forecast timeline scrubber: a 16-day track with day ticks and a
           sliding playhead. The real <input type="range"> sits invisibly on
           top so dragging/keyboard behavior stays native. */
        .timeline-track { position: relative; height: 44px; flex: 1; min-width: 0; }
        .timeline-track::before {
            content: '';
            position: absolute; left: 0; right: 0; bottom: 15px;
            height: 1px; background: #2c2e33;
        }
        .timeline-track:focus-within { outline: 1px solid #5e6ad2; outline-offset: 3px; }
        .timeline-tick {
            position: absolute; bottom: 15px;
            width: 1px; height: 7px;
            background: #45474d;
            transform: translateX(-0.5px);
            pointer-events: none;
        }
        .timeline-tick-label {
            position: absolute; bottom: 0;
            transform: translateX(-50%);
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px; color: #6f7177;
            white-space: nowrap;
            pointer-events: none;
        }
        .timeline-progress {
            position: absolute; left: 0; bottom: 15px;
            height: 1px; background: #5e6ad2;
            pointer-events: none;
        }
        .timeline-playhead {
            position: absolute; top: 4px; bottom: 12px;
            width: 2px; background: #8f9bff;
            transform: translateX(-1px);
            pointer-events: none;
        }
        .timeline-playhead::after {
            content: '';
            position: absolute; top: -3px; left: 50%;
            transform: translateX(-50%);
            width: 7px; height: 7px;
            background: #8f9bff;
        }
        .timeline-input {
            position: absolute; inset: 0;
            width: 100%; height: 100%;
            opacity: 0; margin: 0;
            cursor: ew-resize;
        }
        @media (max-width: 640px) {
            .timeline-tick-label { display: none; }
            .timeline-track { height: 32px; }
            .timeline-track::before, .timeline-tick, .timeline-progress { bottom: 8px; }
            .timeline-playhead { bottom: 5px; }
        }
        /* The full left cluster needs about 580px and the centered switch
           begins 81px left of center. A 1400px cutoff leaves a safe gutter
           between them and changes the search, switch, and tools together. */
        @media (max-width: 1399px) {
            .desktop-only { display: none !important; }
            .compact-only { display: inline-flex !important; }
            /* Collapsed search: the bar hides behind the top-left icon and
               opens as a centered overlay (same pattern as the favorites
               page's add-location modal), so the header row stops fighting
               the view switch and profile cluster for width. */
            #searchBox { display: none; }
            #searchBox.mobile-open {
                display: flex; position: fixed; inset: 0; z-index: 60;
                flex-direction: column; align-items: center;
                padding: 9vh 12px 0;
                background: rgba(0, 0, 0, .65);
                backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
            }
            #searchBox.mobile-open > .surface { width: 100%; max-width: 540px; }
            #searchBox.mobile-open #searchResults {
                position: static; width: 100%; max-width: 540px; margin-top: 4px;
                max-height: min(55dvh, 380px);
            }
            nav[aria-label="Primary view"] { top: 0.75rem; width: 138px; }
            nav[aria-label="Primary view"] a { width: 65px; }
        }
        @media (max-width: 767px) { #forecastDialog { width: 100vw; height: 100dvh; max-height: none; border: 0; } }
        /* Keep the bottom bar clear of the iOS home indicator */
        .bottom-controls { bottom: calc(0.75rem + env(safe-area-inset-bottom, 0px)) !important; }
        /* Give the list a definite zero flex basis and block size. This makes
           it consume only the drawer's remaining height, which is required
           for momentum scrolling inside a transformed fixed element on iOS. */
        #buoy-containers {
            flex: 1 1 0%;
            height: 0;
            min-height: 0;
            max-height: none;
            overflow-x: hidden;
            overflow-y: scroll;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
            touch-action: pan-y;
        }
        </style>
    </head>


    <body class="h-screen w-screen relative bg-[#0f1012]">
        <script src='https://unpkg.com/maplibre-gl@3.3.1/dist/maplibre-gl.js'></script>
        <link href='https://unpkg.com/maplibre-gl@3.3.1/dist/maplibre-gl.css' rel='stylesheet' />

        <!-- 1) Wrap your map div inside #mapView so toggleView can hide/show it -->
        <div id="mapView" class="absolute inset-0 z-0">
            <div
                          id="map"
                          class="absolute inset-0 z-0"
                          style="background: #ccc;"
                          >
                          <!-- Initialize map -->
            </div>
        </div>

        <!-- Primary view switch -->
        <nav class="surface view-switch absolute top-3 left-1/2 -translate-x-1/2 z-30 flex items-center" aria-label="Primary view">
            <a href="/map" aria-current="page" class="flex items-center justify-center bg-[#34363b] text-[11px] font-semibold text-white shadow-sm">Map</a>
            <a href="/favorites" class="flex items-center justify-center text-[11px] font-medium text-[#8b8d93] hover:text-white">Favorites</a>
        </nav>

        <!-- 2) Header "island" at the top -->
        <div class="header absolute top-3 left-3 right-3 z-20 flex items-center gap-2" >

          <!-- Logo -->
          <div class="title hidden sm:block justify-self-start min-w-fit">
                <h1 class="text-sm font-semibold text-white">
                    <a href="/" class="surface h-9 px-3 flex items-center gap-2"><span class="text-[#8f9bff]">◒</span> OpenSwells</a>
                </h1>
            </div>

            <!-- Compact search trigger: below the full-header threshold the
                 inline bar reopens as a centered overlay -->
            <button id="mobileSearchBtn" class="compact-only surface w-9 h-9 items-center justify-center text-[#c6c7ca] shrink-0" onclick="openMobileSearch()" aria-label="Search stations">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
            </button>

            <!-- Search -->
            <div id="searchBox" class="searchbox relative w-full max-w-[440px]">
                <div class="surface relative h-9 flex items-center focus-within:border-[#5e6ad2]">
                    <svg class="absolute left-3 pointer-events-none text-[#8b8d93]" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
                    <input
                     type="text"
                     id="searchInput"
                     autocomplete="off"
                     class="w-full h-full bg-transparent pl-9 pr-10 text-[13px] text-white placeholder-[#8b8d93] outline-none border-0"
                     placeholder="Search stations..."
                     >
                    <kbd class="mono absolute right-2.5 hidden md:flex items-center justify-center w-5 h-5 text-[10px] text-[#8b8d93] border border-[#3b3d42] bg-[#202125] pointer-events-none">/</kbd>
                </div>
                <div id="searchResults" class="surface absolute z-50 left-0 right-0 top-full mt-1 max-h-[280px] overflow-y-auto empty:hidden"></div>
            </div>

            <!-- Icons -->
            <div class="icons surface top-menu relative ml-auto flex items-center min-w-fit">
                <button id="showFavoritesBtn" class="desktop-only toolbar-button favorites-menu-button" onclick="toggleFavorites()" aria-expanded="false" title="Favorites">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.5"><path d="m12 3 2.8 5.7 6.2.9-4.5 4.4 1.1 6.2-5.6-2.9-5.6 2.9 1.1-6.2L3 9.6l6.2-.9L12 3Z"/></svg><span class="hidden sm:inline">Favorites</span><span id="favoritesMenuCount" class="favorites-menu-count hidden">0</span>
                </button>
                <a href="/about" class="desktop-only icon-button" title="About">
                    <svg xmlns="http://www.w3.org/2000/svg" 
                         viewBox="0 0 24 24" fill="none" stroke="currentColor" 
                                                         width="20" height="20" class="md:w-6 md:h-6">
                        <path stroke-linecap="round" 
                              stroke-linejoin="round" 
                              stroke-width="2" 
                              d="M13 16h-1v-4h-1m1-4h.01
                                 M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                </a>
                <a href="https://github.com/open-swells/open-swells-app" class="desktop-only icon-button" title="GitHub">
                    <svg xmlns="http://www.w3.org/2000/svg" 
                         viewBox="0 0 24 24" fill="currentColor"
                                             width="20" height="20" class="md:w-6 md:h-6">
                        <path d="M12 0C5.374 0 0 5.373 0 12c0
                                 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577
                                 v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756
                                 -1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237
                                 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604
                                 -2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221
                                 -.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.487
                                 11.487 0 0112 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23
                                 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221
                                 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293
                                 c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/>
                    </svg>
                </a>
                <a href="#" id="signInBtn" class="desktop-only toolbar-button profile-control border-0 bg-transparent">
                    Sign In
                </a>
                <button id="mobilePanelBtn" class="compact-only icon-button" onclick="toggleFavorites()" aria-expanded="false" aria-label="Open favorites and menu">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
                </button>

                <!-- Sign-in Modal -->
                <div id="signInModal"
                     class="fixed z-50 inset-0 bg-black/60 backdrop-blur-[2px]
                            flex items-start justify-center pt-[20vh] hidden">
                    <div class="signinmodal surface relative w-[300px]">
                        <div class="h-11 px-4 border-b border-[#34363b] flex items-center justify-between">
                            <span class="text-sm font-semibold text-white">Sign in</span>
                            <button id="closeModal" class="icon-button" aria-label="Close">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m18 6-12 12M6 6l12 12"/></svg>
                            </button>
                        </div>
                        <div class="p-4">
                            <button onclick="googleSignIn()"
                                    class="toolbar-button w-full justify-center !h-9">
                                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"
                                     alt="Google" style="width: 16px; height: 16px;">
                                Sign in with Google
                            </button>
                            <p class="mt-3 text-[11px] text-[#8b8d93] leading-relaxed">Sign in to save your favorite stations.</p>
                        </div>
                    </div>
                </div>

                <!-- User Popup -->
                <div id="userPopup"
                     class="surface absolute top-full right-0 mt-2 w-56 overflow-hidden z-10 hidden">
                    <div class="px-3 py-2.5 border-b border-[#34363b] flex items-start justify-between gap-2">
                        <div class="min-w-0">
                            <p id="userName" class="text-[13px] font-medium text-white truncate"></p>
                            <p id="userEmail" class="text-[11px] text-[#8b8d93] truncate"></p>
                        </div>
                        <button id="closeUserPopup" class="icon-button !w-6 !h-6 shrink-0" aria-label="Close">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m18 6-12 12M6 6l12 12"/></svg>
                        </button>
                    </div>
                    <a href="#" id="signOutBtn"
                                class="block px-3 py-2 text-xs text-[#d6d7da] hover:bg-[#2a2c30]">
                        Sign out
                    </a>
                </div>
            </div>
        </div>
        <!-- End Header -->


            <div id="drawerBackdrop" class="fixed inset-0 z-[35] bg-black/25" onclick="closeFavorites()"></div>
            <!-- Favorites drawer -->
            <div 
                                id="favoritesView" 
                                class="surface fixed z-40 top-3 bottom-3 right-3 flex flex-col overflow-hidden"

            <script>
                function toggleFavorites() {
                    const drawer = document.getElementById('favoritesView');
                    drawer.classList.contains('is-open') ? closeFavorites() : openFavorites();
                }

                function openFavorites() {
                    document.getElementById('favoritesView').classList.add('is-open');
                    document.getElementById('drawerBackdrop').classList.add('is-open');
                    document.getElementById('showFavoritesBtn').setAttribute('aria-expanded', 'true');
                    document.getElementById('mobilePanelBtn').setAttribute('aria-expanded', 'true');
                }

                function closeFavorites() {
                    document.getElementById('favoritesView').classList.remove('is-open');
                    document.getElementById('drawerBackdrop').classList.remove('is-open');
                    document.getElementById('showFavoritesBtn').setAttribute('aria-expanded', 'false');
                    document.getElementById('mobilePanelBtn').setAttribute('aria-expanded', 'false');
                }

                function openDrawerAccount() {
                    closeFavorites();
                    document.getElementById('signInBtn').click();
                }

                // One modal serves both station and beach pages; only the
                // iframe URL and header text differ.
                let activeForecastFavorite = null;

                function openModalFrame(url, title, subtitle, favorite = null) {
                    closeFavorites();
                    const modal = document.getElementById('forecastModal');
                    const frame = document.getElementById('forecastFrame');
                    document.getElementById('forecastModalTitle').textContent = title;
                    document.getElementById('forecastStation').textContent = subtitle;
                    document.getElementById('forecastLoading').classList.remove('hidden');
                    frame.classList.add('opacity-0');
                    frame.onload = () => {
                        document.getElementById('forecastLoading').classList.add('hidden');
                        frame.classList.remove('opacity-0');
                        bindForecastPageFavorite();
                    };
                    frame.src = url;
                    modal.classList.add('is-open');
                    activeForecastFavorite = favorite;
                }

                function openForecast(stationId, stationName = '') {
                    if (!stationId) return;
                    openModalFrame(`/forecast/${stationId}`,
                        stationName || 'Station report & forecast', `BUOY ${stationId}`,
                        { type: 'buoy', id: stationId });
                }

                function openBeach(zoneId, zoneName = '') {
                    if (!zoneId) return;
                    openModalFrame(`/beach/${encodeURIComponent(zoneId)}`,
                        zoneName || 'Beach forecast', `SURF ZONE ${zoneId}`);
                }

                function openSpot(spotId, spotName = '', region = '') {
                    if (!spotId) return;
                    openModalFrame(`/spot/${encodeURIComponent(spotId)}`,
                        spotName || 'Spot forecast', region ? region.toUpperCase() : 'SURF SPOT',
                        { type: 'spot', id: spotId });
                }

                function closeForecast() {
                    document.getElementById('forecastModal').classList.remove('is-open');
                }

                function syncForecastPageFavorite() {
                    if (!activeForecastFavorite) return;
                    const frame = document.getElementById('forecastFrame');
                    const button = frame.contentDocument?.querySelector('[data-forecast-favorite]');
                    if (!button) return;
                    const isFavorite = activeForecastFavorite.type === 'spot'
                        ? userSpots.includes(activeForecastFavorite.id)
                        : userBuoys.includes(activeForecastFavorite.id);
                    button.textContent = isFavorite ? '−' : '+';
                    button.classList.toggle('is-favorite', isFavorite);
                    button.title = isFavorite ? 'Remove from favorites' : 'Add to favorites';
                    button.setAttribute('aria-label', button.title);
                }

                function bindForecastPageFavorite() {
                    if (!activeForecastFavorite) return;
                    const frame = document.getElementById('forecastFrame');
                    const button = frame.contentDocument?.querySelector('[data-forecast-favorite]');
                    if (!button) return;
                    button.onclick = async () => {
                        if (activeForecastFavorite.type === 'spot') await toggleSpotFavorite(activeForecastFavorite.id);
                        else await toggleFavorite(activeForecastFavorite.id);
                        syncForecastPageFavorite();
                    };
                    syncForecastPageFavorite();
                }

                document.addEventListener('keydown', (event) => {
                    if (event.key !== 'Escape') return;
                    if (document.getElementById('forecastModal').classList.contains('is-open')) closeForecast();
                    else closeFavorites();
                });

                document.getElementById('forecastModal').addEventListener('click', (event) => {
                    if (event.target.id === 'forecastModal') closeForecast();
                });
            </script>
