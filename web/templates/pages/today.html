        <script src="https://www.gstatic.com/firebasejs/12.16.0/firebase-app-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/12.16.0/firebase-auth-compat.js"></script>
        <script src="/assets/firebase-auth.js"></script>
        <script> 
            let userBuoys = [];
            let userSpots = [];
            const popupMap = new Map(); // Use a Map to store popups by their ID

            // All per-user API calls authenticate with the Firebase ID token;
            // the server derives the uid from the verified token.
            async function authFetch(url, options = {}) {
                return openSwellsAuth.authFetch(url, options);
            }

            async function loadForecastSummary() {
                try {
                    const summaryResponse = await authFetch('/forecast-summary');

                    if (!summaryResponse.ok) {
                        console.log("Error: Could not load forecast summary");
                        throw new Error('Failed to load forecast summary');
                    }

                    const html = await summaryResponse.text();
                    document.getElementById('buoy-containers').innerHTML = html;

                } catch (error) {
                    console.error('Error loading forecast summary:', error);
                    document.getElementById('buoy-containers').innerHTML =
                        '<p>Failed to load forecast summary. Please try again later.</p>';
                }
            }

            async function loadUserBuoys() {
                try {
                    const userBuoysResponse = await authFetch('/api/favorites');

                    if (!userBuoysResponse.ok) {
                        console.log("Error: Could not load user buoys");
                        throw new Error('Failed to load user buoys');
                    }

                    const favoritesData = await userBuoysResponse.json();
                    userBuoys = favoritesData.buoys || [];
                    userSpots = favoritesData.spots || [];

                    updateFavoritesMenuCount();

                    console.log('User buoys:', userBuoys, 'user spots:', userSpots);
                } catch (error) {
                    console.error('Error loading user buoys:', error);
                    userBuoys = [];
                    userSpots = [];
                    document.getElementById('favoritesMenuCount').classList.add('hidden');
                }
            }

            function updateFavoritesMenuCount() {
                const count = userBuoys.length + userSpots.length;
                const countBadge = document.getElementById('favoritesMenuCount');
                countBadge.textContent = count;
                countBadge.classList.toggle('hidden', count === 0);
                syncForecastPageFavorite();
            }
            // Wait for Firebase authentication
            document.addEventListener('DOMContentLoaded', () => {
                openSwellsAuth.auth.onAuthStateChanged(async (user) => {
                    updateUIForSignedInUser(user);
                    if (user) {
                        await loadForecastSummary();
                        await loadUserBuoys();
                        // Update all popup contents after loading user buoys
                    } else {
                        console.log('User not signed in.');
                        document.getElementById('favoritesMenuCount').classList.add('hidden');
                        document.getElementById('buoy-containers').innerHTML =
                            '<p class="dark:text-white">Please sign in to view your favorite buoys.</p>';
                    }
                });
            });

            function googleSignIn() {
                openSwellsAuth.signIn()
                    .then(result => {
                        if (result && result.user) updateUIForSignedInUser(result.user);
                    })
                    .catch(error => console.error('Sign-in error:', error));
            }

            function updateUIForSignedInUser(user) {
                const signInBtn = document.getElementById('signInBtn');
                if (user) {
                    // User is signed in
                    signInBtn.classList.add('is-user');
                    signInBtn.replaceChildren();
                    if (user.photoURL) {
                        const profileImage = document.createElement('img');
                        profileImage.src = user.photoURL;
                        profileImage.alt = 'Profile';
                        profileImage.className = 'md:w-8 md:h-8 w-6 h-6 rounded-full';
                        signInBtn.appendChild(profileImage);
                    } else {
                        signInBtn.textContent = 'Account';
                    }
                    signInBtn.onclick = () => document.getElementById('userPopup').classList.remove('hidden');
                    document.getElementById('userName').textContent = user.displayName;
                    document.getElementById('userEmail').textContent = user.email;
                    document.getElementById('drawerAccountLabel').textContent = 'Account';
                } else {
                    // User is signed out
                    signInBtn.classList.remove('is-user');
                    signInBtn.innerHTML = 'Sign In';
                    signInBtn.onclick = () => document.getElementById('signInModal').classList.remove('hidden');
                    document.getElementById('drawerAccountLabel').textContent = 'Sign in';
                }
                document.getElementById('signInModal').classList.add('hidden');
            }

            document.getElementById('closeUserPopup').addEventListener('click', function() {
                document.getElementById('userPopup').classList.add('hidden');
            });

            document.getElementById('closeModal').addEventListener('click', function() {
                document.getElementById('signInModal').classList.add('hidden');
            });

            document.getElementById('signOutBtn').addEventListener('click', function() {
                openSwellsAuth.signOut().then(() => {
                    updateUIForSignedInUser(null);
                    document.getElementById('userPopup').classList.add('hidden');
                    userBuoys = [];
                    userSpots = [];
                    document.getElementById('favoritesMenuCount').classList.add('hidden');
                });
            });

            // Close the modal if clicking outside of it
            window.onclick = function(event) {
                var modal = document.getElementById('signInModal');
                if (event.target == modal) {
                    modal.classList.add('hidden');
                }
            }

            // Check auth state on page load
            // Initialize MapLibre map

            // Hourly to f120 (5 days), then 3-hourly to f384 — must match
            // hour_sequence in grib-parse-collect/gfs_to_contours.py.
            const forecastHours = [
                ...Array.from({ length: 121 }, (_, i) => i),
                ...Array.from({ length: 88 }, (_, i) => 123 + i * 3),
            ];

            // Initialize MapLibre map
            const map = new maplibregl.Map({
                container: 'map',
                center: [-121.157227, 33.800832], // Note: MapLibre uses [lng, lat] order
                style: 'https://basemaps.cartocdn.com/gl/voyager-gl-style/style.json',
                zoom: 5
            });

            const playButton = document.getElementById('playButton');
            const timeSlider = document.getElementById('timeSlider');
            const timeDayLabel = document.getElementById('timeDay');
            const timeClockLabel = document.getElementById('timeClock');
            const timelinePlayhead = document.getElementById('timelinePlayhead');
            const timelineProgress = document.getElementById('timelineProgress');
            const timelineTicks = document.getElementById('timelineTicks');
            const lastForecastHour = forecastHours[forecastHours.length - 1];

            timeSlider.max = forecastHours.length - 1;
            timeSlider.value = 0;

            let currentIndex = 0;
            let isPlaying = false;
            let animationInterval;
            let forecastStartTime;

            function hourToFilename(hour) {
                return `/static/contours_${String(hour).padStart(3, '0')}.geojson`;
            }

            function hourToArrowsFilename(hour) {
                return `/static/arrows_${String(hour).padStart(3, '0')}.geojson`;
            }

            function hourToHeatmapFilename(hour) {
                return `/static/heatmap_${String(hour).padStart(3, '0')}.png`;
            }

            function hourToPartitionsFilename(hour) {
                return `/static/swell_partitions_${String(hour).padStart(3, '0')}.geojson`;
            }

            // Height bands — must match FIXED_LEVELS in gfs_to_contours.py.
            // Storm-scale ramp (weather-map convention): calm blues through
            // green/yellow into red and near-black for extreme swell.
            const SWELL_BANDS = [
                { min: 0,   color: '#a5d5f0', label: '< 0.5' },
                { min: 0.5, color: '#64a8e8', label: '0.5 – 1' },
                { min: 1,   color: '#3178d2', label: '1 – 1.5' },
                { min: 1.5, color: '#15a3a3', label: '1.5 – 2' },
                { min: 2,   color: '#2fb54e', label: '2 – 2.5' },
                { min: 2.5, color: '#a3c520', label: '2.5 – 3' },
                { min: 3,   color: '#f2ce08', label: '3 – 4' },
                { min: 4,   color: '#f59a0b', label: '4 – 5' },
                { min: 5,   color: '#ea4b28', label: '5 – 6' },
                { min: 6,   color: '#b31212', label: '6 – 8' },
                { min: 8,   color: '#4a0a1e', label: '8+' },
            ];

            const fillColorExpression = ['step', ['get', 'contour_mean'], SWELL_BANDS[0].color];
            for (const band of SWELL_BANDS.slice(1)) {
                fillColorExpression.push(band.min, band.color);
            }

            // Legend rows, highest band on top
            const legendBands = document.getElementById('legendBands');
            [...SWELL_BANDS].reverse().forEach(band => {
                const row = document.createElement('div');
                row.className = 'flex items-center gap-2';
                row.innerHTML =
                    `<div class="w-6 h-4" style="background-color: ${band.color};"></div>` +
                    `<span class="text-xs dark:text-white">${band.label}</span>`;
                legendBands.appendChild(row);
            });

            const EMPTY_FC = { type: 'FeatureCollection', features: [] };

            function makeArrowImage(size = 44) {
                const canvas = document.createElement('canvas');
                canvas.width = canvas.height = size;
                const ctx = canvas.getContext('2d');
                ctx.translate(size / 2, size / 2);
                // Arrow points up (north); icon-rotate spins it per feature.
                const s = size / 2;
                ctx.beginPath();
                ctx.moveTo(0, -s * 0.8);
                ctx.lineTo(s * 0.38, -s * 0.15);
                ctx.lineTo(s * 0.12, -s * 0.15);
                ctx.lineTo(s * 0.12, s * 0.8);
                ctx.lineTo(-s * 0.12, s * 0.8);
                ctx.lineTo(-s * 0.12, -s * 0.15);
                ctx.lineTo(-s * 0.38, -s * 0.15);
                ctx.closePath();
                ctx.lineWidth = 3;
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.9)';
                ctx.stroke();
                ctx.fillStyle = 'rgba(11, 11, 11, 0.8)';
                ctx.fill();
                return ctx.getImageData(0, 0, size, size);
            }

            function addSwellLayers() {
                for (const layer of ['hillshade', 'contour-fills', 'swell-arrows']) {
                    if (map.getLayer(layer)) map.removeLayer(layer);
                }
                for (const source of ['terrain-dem', 'contours', 'arrows']) {
                    if (map.getSource(source)) map.removeSource(source);
                }

                // Terrain relief under the swell layers (free AWS open data).
                // The contours no longer cover land, so this gives the land
                // its geography back.
                map.addSource('terrain-dem', {
                    type: 'raster-dem',
                    tiles: ['https://s3.amazonaws.com/elevation-tiles-prod/terrarium/{z}/{x}/{y}.png'],
                    encoding: 'terrarium',
                    tileSize: 256,
                    maxzoom: 12,
                    attribution: 'Terrain tiles: Mapzen / AWS Open Data'
                });
                map.addLayer({
                    id: 'hillshade',
                    type: 'hillshade',
                    source: 'terrain-dem',
                    paint: {
                        'hillshade-exaggeration': 0.35,
                        'hillshade-shadow-color': 'rgba(0, 0, 0, 0.35)',
                        'hillshade-highlight-color': 'rgba(255, 255, 255, 0.25)'
                    }
                });

                map.addSource('contours', { type: 'geojson', data: EMPTY_FC });
                map.addSource('arrows', { type: 'geojson', data: EMPTY_FC });

                map.addLayer({
                    id: 'contour-fills',
                    type: 'fill',
                    source: 'contours',
                    paint: {
                        'fill-color': fillColorExpression,
                        'fill-opacity': 0.75,
                        'fill-outline-color': 'rgba(0, 0, 0, 0.12)'
                    }
                });

                if (!map.hasImage('swell-arrow')) {
                    map.addImage('swell-arrow', makeArrowImage(), { pixelRatio: 2 });
                }
                map.addLayer({
                    id: 'swell-arrows',
                    type: 'symbol',
                    source: 'arrows',
                    layout: {
                        'icon-image': 'swell-arrow',
                        // d = direction the swell comes FROM; point where it's going
                        'icon-rotate': ['+', ['get', 'd'], 180],
                        'icon-rotation-alignment': 'map',
                        // collision detection thins arrows out at low zoom
                        'icon-allow-overlap': false,
                        'icon-padding': 4,
                        'icon-size': ['interpolate', ['linear'], ['zoom'], 2, 0.45, 5, 0.7, 8, 1.0],
                    },
                    paint: { 'icon-opacity': 0.85 },
                });
                const arrowsToggle = document.getElementById('arrowsToggle');
                if (arrowsToggle && !arrowsToggle.checked) {
                    map.setLayoutProperty('swell-arrows', 'visibility', 'none');
                }

            }

            // --- Heatmap rendering -------------------------------------------
            // The pipeline pre-renders each hour's height field as a Mercator
            // PNG (heatmap_XXX.png); metadata.json carries the corner bounds.
            // Two image sources ping-pong with an opacity transition so frame
            // changes crossfade instead of popping. The contour polygons stay
            // as a fallback when a run has no heatmaps.
            const HEATMAP_OPACITY = 0.85;
            const HEATMAP_FADE_MS = 550;
            const HEATMAP_OVERLAP_MS = 180;
            const TRANSPARENT_PX =
                'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNgYGD4DwABBAEAX+XLSgAAAABJRU5ErkJggg==';
            let heatmapBounds = null; // set from metadata.json
            let heatmapReady = false;
            let swellLayersReady = false;
            let activeHeatLayer = 'b';
            let firstHeatmapFrameShown = false;
            let heatmapTransitionToken = 0;
            let swellRenderMode = 'heatmap';

            function wantsHeatmap() {
                return swellRenderMode === 'heatmap' && heatmapReady;
            }

            function isGlobalZeroTo360(bounds) {
                return bounds && bounds.west >= 0 && bounds.east > 180 && (bounds.east - bounds.west) > 300;
            }

            function displayHeatmapBounds(bounds) {
                if (!isGlobalZeroTo360(bounds)) {
                    return bounds;
                }
                return {
                    west: -180,
                    east: 180,
                    north: bounds.north,
                    south: bounds.south,
                };
            }

            async function rollHeatmapBlob(blob) {
                if (!isGlobalZeroTo360(heatmapBounds)) {
                    return URL.createObjectURL(blob);
                }

                try {
                    const bitmap = await createImageBitmap(blob);
                    const canvas = document.createElement('canvas');
                    canvas.width = bitmap.width;
                    canvas.height = bitmap.height;
                    const ctx = canvas.getContext('2d');
                    const halfWidth = Math.floor(bitmap.width / 2);
                    const rightWidth = bitmap.width - halfWidth;

                    // Source PNGs are 0..360 longitude. Roll 180..360 to the left
                    // so the image aligns with the map's -180..180 initial world.
                    ctx.drawImage(bitmap, halfWidth, 0, rightWidth, bitmap.height, 0, 0, rightWidth, bitmap.height);
                    ctx.drawImage(bitmap, 0, 0, halfWidth, bitmap.height, rightWidth, 0, halfWidth, bitmap.height);

                    if (bitmap.close) bitmap.close();
                    const shiftedBlob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
                    return URL.createObjectURL(shiftedBlob || blob);
                } catch (error) {
                    console.warn('Unable to normalize heatmap longitude; using original PNG.', error);
                    return URL.createObjectURL(blob);
                }
            }

            function decodeImageUrl(url) {
                return new Promise(resolve => {
                    const img = new Image();
                    img.onload = () => resolve(url);
                    img.onerror = () => resolve(url);
                    img.src = url;
                    if (img.decode) {
                        img.decode().then(() => resolve(url)).catch(() => resolve(url));
                    }
                });
            }

            function hideHeatmapLayers() {
                heatmapTransitionToken++;
                firstHeatmapFrameShown = false;
                for (const layer of ['heatmap-a', 'heatmap-b']) {
                    if (map.getLayer(layer)) {
                        map.setPaintProperty(layer, 'raster-opacity', 0);
                    }
                }
                for (const layer of nwpsLayers) {
                    if (map.getLayer(layer.id)) {
                        map.setPaintProperty(layer.id, 'raster-opacity', 0);
                    }
                }
            }

            // --- NWPS nearshore overlays ---------------------------------
            // Regional high-res wave frames (nwps_<wfo>_<grid>_<HHH>.png),
            // valid-time-aligned with the global heatmap hours and drawn on
            // top of it. Hours a domain doesn't cover just fade the overlay
            // out and the global field shows through.
            let nwpsLayers = []; // [{id, prefix, bounds, hours: Set}]

            // NWPS bounds are regional 0..360 (never global), so unlike the
            // heatmap no image rolling is needed — only a coordinate shift.
            function normalizeNwpsBounds(b) {
                const wrap = lon => (lon > 180 ? lon - 360 : lon);
                return { west: wrap(b.west), east: wrap(b.east), north: b.north, south: b.south };
            }

            function nwpsFrameUrl(layer, hour) {
                return `${layer.prefix}${String(hour).padStart(3, '0')}.png`;
            }

            // Same LRU-of-object-URLs pattern as loadImageFrame, minus the
            // longitude roll (rollHeatmapBlob keys off the *global* bounds
            // and would wrongly split these regional PNGs).
            const nwpsImageCache = new Map(); // url -> Promise<objectURL|null>
            function loadNwpsFrame(url) {
                if (nwpsImageCache.has(url)) {
                    const cached = nwpsImageCache.get(url);
                    nwpsImageCache.delete(url);
                    nwpsImageCache.set(url, cached); // refresh LRU position
                    return cached;
                }
                const promise = fetch(url)
                    .then(r => {
                        if (!r.ok) throw new Error(`${r.status} for ${url}`);
                        return r.blob();
                    })
                    .then(blob => URL.createObjectURL(blob))
                    .then(objectUrl => decodeImageUrl(objectUrl))
                    .catch(() => null); // hour not covered: global shows through
                nwpsImageCache.set(url, promise);
                if (nwpsImageCache.size > FRAME_CACHE_MAX) {
                    const oldest = nwpsImageCache.keys().next().value;
                    nwpsImageCache.get(oldest).then(u => u && URL.revokeObjectURL(u));
                    nwpsImageCache.delete(oldest);
                }
                return promise;
            }

            function maybeAddNwpsLayers() {
                // Needs the style loaded, like maybeAddHeatmapLayers.
                if (!nwpsLayers.length || !map.getLayer('contour-fills')) return;
                for (const layer of nwpsLayers) {
                    if (map.getSource(layer.id)) continue;
                    const b = layer.bounds;
                    map.addSource(layer.id, {
                        type: 'image',
                        url: TRANSPARENT_PX,
                        coordinates: [
                            [b.west, b.north],
                            [b.east, b.north],
                            [b.east, b.south],
                            [b.west, b.south],
                        ],
                    });
                    // Above heatmap-a/b, below contours/arrows/labels. The
                    // metadata orders CG1 before CG2, so finer grids added
                    // later naturally land on top.
                    map.addLayer({
                        id: layer.id,
                        type: 'raster',
                        source: layer.id,
                        paint: {
                            'raster-opacity': 0,
                            'raster-opacity-transition': { duration: HEATMAP_FADE_MS },
                            'raster-resampling': 'linear',
                            'raster-fade-duration': 0,
                        },
                    }, 'contour-fills');
                }
            }

            // Single-buffered (no a/b ping-pong): the regional PNGs are tiny
            // and sit on the crossfading global heatmap, so a hard swap is
            // barely perceptible.
            async function updateNwpsFrames(hours, token, wantHeatmap) {
                for (const layer of nwpsLayers) {
                    if (!map.getSource(layer.id)) continue;
                    if (wantHeatmap && layer.hours.has(hours)) {
                        const url = await loadNwpsFrame(nwpsFrameUrl(layer, hours));
                        if (token !== updateToken) return;
                        if (url) {
                            map.getSource(layer.id).updateImage({ url });
                            // Full opacity: the PNG's own alpha channel does
                            // the transparency and edge fading; 0.85 here
                            // would re-dim it against the global layer.
                            map.setPaintProperty(layer.id, 'raster-opacity', 1.0);
                            continue;
                        }
                    }
                    map.setPaintProperty(layer.id, 'raster-opacity', 0);
                }
            }

            function maybeAddHeatmapLayers() {
                // Needs both the style (contour-fills exists) and the bounds.
                if (heatmapReady || !heatmapBounds || !map.getLayer('contour-fills')) {
                    return;
                }
                const bounds = displayHeatmapBounds(heatmapBounds);
                const coords = [
                    [bounds.west, bounds.north],
                    [bounds.east, bounds.north],
                    [bounds.east, bounds.south],
                    [bounds.west, bounds.south],
                ];
                for (const key of ['a', 'b']) {
                    map.addSource(`heatmap-${key}`, {
                        type: 'image',
                        url: TRANSPARENT_PX,
                        coordinates: coords,
                    });
                    map.addLayer({
                        id: `heatmap-${key}`,
                        type: 'raster',
                        source: `heatmap-${key}`,
                        paint: {
                            'raster-opacity': 0,
                            'raster-opacity-transition': { duration: HEATMAP_FADE_MS },
                            'raster-resampling': 'linear',
                            'raster-fade-duration': 0,
                        },
                    }, 'contour-fills'); // below the (empty) contour fallback
                }
                heatmapReady = true;
                if (wantsHeatmap()) {
                    const contourSource = map.getSource('contours');
                    if (contourSource) contourSource.setData(EMPTY_FC);
                }
                updateMap(currentIndex);
            }

            const FRAME_CACHE_MAX = 48;

            // Heatmap frames are fetched as blobs into an LRU of object URLs.
            const imageCache = new Map(); // url -> Promise<objectURL|null>

            function loadImageFrame(url) {
                if (imageCache.has(url)) {
                    const cached = imageCache.get(url);
                    imageCache.delete(url);
                    imageCache.set(url, cached);
                    return cached;
                }
                const promise = fetch(url)
                    .then(r => {
                        if (!r.ok) throw new Error(`${r.status} for ${url}`);
                        return r.blob();
                    })
                    .then(blob => rollHeatmapBlob(blob))
                    .then(url => decodeImageUrl(url))
                    .catch(() => null); // missing hour: fall back to contours
                imageCache.set(url, promise);
                if (imageCache.size > FRAME_CACHE_MAX) {
                    const oldest = imageCache.keys().next().value;
                    imageCache.get(oldest).then(u => u && URL.revokeObjectURL(u));
                    imageCache.delete(oldest);
                }
                return promise;
            }

            function showHeatmapFrame(url) {
                const next = activeHeatLayer === 'a' ? 'b' : 'a';
                const previous = activeHeatLayer;
                const token = ++heatmapTransitionToken;

                map.getSource(`heatmap-${next}`).updateImage({ url });

                if (!firstHeatmapFrameShown) {
                    map.setPaintProperty(`heatmap-${previous}`, 'raster-opacity', 0);
                    map.setPaintProperty(`heatmap-${next}`, 'raster-opacity', HEATMAP_OPACITY);
                    activeHeatLayer = next;
                    firstHeatmapFrameShown = true;
                    return;
                }

                // Keep the current frame visible briefly while the next image
                // source is uploaded, then overlap the fades to avoid a flash.
                requestAnimationFrame(() => {
                    requestAnimationFrame(() => {
                        if (token !== heatmapTransitionToken) return;
                        map.setPaintProperty(`heatmap-${next}`, 'raster-opacity', HEATMAP_OPACITY);
                        window.setTimeout(() => {
                            if (token !== heatmapTransitionToken) return;
                            map.setPaintProperty(`heatmap-${previous}`, 'raster-opacity', 0);
                        }, HEATMAP_OVERLAP_MS);
                    });
                });
                activeHeatLayer = next;
            }

            function initializeSwellMap() {
                addSwellLayers();
                swellLayersReady = true;
                // Find the first symbol layer and slot the swell layers beneath
                // it so place labels stay readable. Fills sit under arrows.
                let firstSymbolId;
                for (const layer of map.getStyle().layers) {
                    if (layer.type === 'symbol') {
                        firstSymbolId = layer.id;
                        break;
                    }
                }
                // Bottom-to-top: hillshade, swell fills, arrows, then labels.
                map.moveLayer('swell-arrows', firstSymbolId);
                map.moveLayer('contour-fills', 'swell-arrows');
                map.moveLayer('hillshade', 'contour-fills');
                maybeAddHeatmapLayers(); // if metadata arrived before the style
                maybeAddNwpsLayers();
                updateMap(currentIndex);
            }

            // Hover readout in the legend. In heatmap mode the value comes
            // from the nearest arrow grid point (exact height); in contour
            // fallback mode it comes from the hovered polygon's band.
            const legendReadout = document.getElementById('legendReadout');

            map.on('mousemove', (e) => {
                if (!legendReadout || !wantsHeatmap()) return;
                const lng = e.lngLat.lng;
                const lat = e.lngLat.lat;
                let best = null;
                let bestDist = 4; // squared degrees; ~2 deg search radius
                for (const f of currentArrows.features) {
                    const [flng, flat] = f.geometry.coordinates;
                    const dlng = Math.min(Math.abs(flng - lng), 360 - Math.abs(flng - lng));
                    const dist = dlng * dlng + (flat - lat) * (flat - lat);
                    if (dist < bestDist) {
                        bestDist = dist;
                        best = f;
                    }
                }
                legendReadout.textContent = best
                    ? `${best.properties.h} m at cursor`
                    : '';
            });

            map.on('mousemove', 'contour-fills', (e) => {
                if (!legendReadout || wantsHeatmap()) return;
                if (!e.features || !e.features.length) return;
                const p = e.features[0].properties;
                legendReadout.textContent = p.contour_max >= 20
                    ? `≥ ${p.contour_min} m at cursor`
                    : `${p.contour_min} – ${p.contour_max} m at cursor`;
            });
            map.on('mouseleave', 'contour-fills', () => {
                if (legendReadout && !wantsHeatmap()) legendReadout.textContent = '';
            });

            function nearestPointFeature(features, lngLat, maxDist2 = 4) {
                let best = null;
                let bestDist = maxDist2; // squared degrees
                for (const f of features) {
                    const [flng, flat] = f.geometry.coordinates;
                    const dlng = Math.min(Math.abs(flng - lngLat.lng), 360 - Math.abs(flng - lngLat.lng));
                    const dist = dlng * dlng + (flat - lngLat.lat) * (flat - lngLat.lat);
                    if (dist < bestDist) {
                        bestDist = dist;
                        best = f;
                    }
                }
                return best;
            }

            // Hovering an arrow shows the full swell reading; the individual
            // swell systems from swell_partitions_XXX.geojson stream in once
            // that frame is cached.
            const arrowPopup = new maplibregl.Popup({
                closeButton: false,
                closeOnClick: false,
                offset: 12,
            });
            map.on('mouseenter', 'swell-arrows', (e) => {
                const p = e.features[0].properties;
                const lngLat = e.lngLat;
                const base = `<div class="text-xs">${p.h} m @ ${p.p} s from ${p.d}&deg;</div>`;
                arrowPopup.setLngLat(lngLat).setHTML(base).addTo(map);

                loadFrame(hourToPartitionsFilename(forecastHours[currentIndex])).then(fc => {
                    if (!arrowPopup.isOpen() || !fc.features || !fc.features.length) return;
                    const f = nearestPointFeature(fc.features, lngLat);
                    if (!f) return;
                    const rows = [];
                    for (let k = 1; k <= 3; k++) {
                        const h = f.properties[`h${k}`];
                        if (h === undefined) continue;
                        rows.push(`<div class="text-xs" style="color: #c6c7ca;">${h} m @ ${f.properties[`p${k}`]} s from ${f.properties[`d${k}`]}&deg;</div>`);
                    }
                    if (rows.length > 1) {
                        arrowPopup.setHTML(base +
                            `<div class="mono" style="margin: 6px 0 2px; font-size: 9px; color: #8b8d93; text-transform: uppercase;">Swell systems</div>` +
                            rows.join(''));
                    }
                });
            });
            map.on('mouseleave', 'swell-arrows', () => arrowPopup.remove());

            // Wind arrows: hover shows speed (converted to mph) and origin
            document.getElementById('arrowsToggle').addEventListener('change', (e) => {
                if (map.getLayer('swell-arrows')) {
                    map.setLayoutProperty('swell-arrows', 'visibility',
                        e.target.checked ? 'visible' : 'none');
                }
            });

            document.getElementById('heatmapToggle').addEventListener('change', (e) => {
                swellRenderMode = e.target.checked ? 'heatmap' : 'contours';
                legendReadout.textContent = '';
                updateMap(currentIndex);
            });

            // Fetch metadata and initialize time display
            async function fetchMetadata() {
                try {
                    const response = await fetch('/static/metadata.json'); // Use local file
                    if (!response.ok) {
                        throw new Error('Failed to fetch metadata');
                    }
                    const metadata = await response.json();
                    const timestamp = new Date(metadata.timestamp);
                    
                    const [datePart, timePart] = metadata.forecast_start.split('_');
                    const year = datePart.substring(0, 4);
                    const month = datePart.substring(4, 6);
                    const day = datePart.substring(6, 8);
                    const hour = timePart.substring(0, 2);
                    
                    forecastStartTime = new Date(Date.UTC(year, month - 1, day, hour));

                    if (metadata.heatmap_bounds) {
                        heatmapBounds = metadata.heatmap_bounds;
                        maybeAddHeatmapLayers();
                    }

                    if (Array.isArray(metadata.nwps_layers)) {
                        // One layer per grid tier; frames merge every office's
                        // domain (l.domains lists the contributing WFOs/cycles).
                        nwpsLayers = metadata.nwps_layers.map(l => ({
                            id: `nwps-${l.grid}`,
                            prefix: `/static/nwps_${l.grid}_`,
                            bounds: normalizeNwpsBounds(l.bounds),
                            hours: new Set(l.hours),
                        }));
                        maybeAddNwpsLayers();
                    }

                    document.getElementById('metadataTimestamp').textContent = timestamp.toLocaleString();
                    buildTimelineTicks(); // labels need forecastStartTime
                    updateTimeDisplay(forecastHours[currentIndex]);
                } catch (error) {
                    console.error('Error fetching metadata:', error);
                    document.getElementById('metadataTimestamp').textContent = 'Unable to load timestamp';
                }
            }
            const metadataReady = fetchMetadata();

            const dayFormatter = new Intl.DateTimeFormat(undefined, {
                weekday: 'short',
                month: 'short',
                day: 'numeric',
            });
            const clockFormatter = new Intl.DateTimeFormat(undefined, {
                hour: 'numeric',
                minute: '2-digit',
                hour12: true,
            });
            const tickFormatter = new Intl.DateTimeFormat(undefined, {
                weekday: 'short',
                day: 'numeric',
            });

            function updateTimeDisplay(hours) {
                const pct = (hours / lastForecastHour) * 100;
                timelinePlayhead.style.left = `${pct}%`;
                timelineProgress.style.width = `${pct}%`;

                if (!forecastStartTime) {
                    return;
                }

                const currentTime = new Date(
                    forecastStartTime.getTime() + hours * 60 * 60 * 1000
                );
                timeDayLabel.textContent = dayFormatter.format(currentTime);
                timeClockLabel.textContent = clockFormatter.format(currentTime);
            }

            // One tick per forecast day; a label on every other tick keeps
            // the track readable at narrow widths.
            function buildTimelineTicks() {
                timelineTicks.innerHTML = '';
                for (let hour = 24; hour < lastForecastHour; hour += 24) {
                    const pct = (hour / lastForecastHour) * 100;
                    const tick = document.createElement('div');
                    tick.className = 'timeline-tick';
                    tick.style.left = `${pct}%`;
                    timelineTicks.appendChild(tick);

                    if (forecastStartTime && (hour / 24) % 2 === 0) {
                        const label = document.createElement('div');
                        label.className = 'timeline-tick-label';
                        label.style.left = `${pct}%`;
                        label.textContent = tickFormatter.format(new Date(
                            forecastStartTime.getTime() + hour * 60 * 60 * 1000
                        ));
                        timelineTicks.appendChild(label);
                    }
                }
            }
            buildTimelineTicks();

            // Parsed frames are cached (LRU) and the next few hours prefetched,
            // so scrubbing and playback don't wait on the network per frame.
            const frameCache = new Map(); // url -> Promise<geojson>

            function loadFrame(url) {
                if (frameCache.has(url)) {
                    const cached = frameCache.get(url);
                    frameCache.delete(url);
                    frameCache.set(url, cached); // refresh LRU position
                    return cached;
                }
                const promise = fetch(url)
                    .then(r => {
                        if (!r.ok) throw new Error(`${r.status} for ${url}`);
                        return r.json();
                    })
                    // A missing hour clears the layer instead of breaking playback
                    .catch(() => EMPTY_FC);
                frameCache.set(url, promise);
                if (frameCache.size > FRAME_CACHE_MAX) {
                    frameCache.delete(frameCache.keys().next().value);
                }
                return promise;
            }

            function prefetchFrames(index, count = 4) {
                for (let i = 1; i <= count; i++) {
                    const hour = forecastHours[(index + i) % forecastHours.length];
                    if (wantsHeatmap()) {
                        loadImageFrame(hourToHeatmapFilename(hour));
                        for (const layer of nwpsLayers) {
                            if (layer.hours.has(hour)) loadNwpsFrame(nwpsFrameUrl(layer, hour));
                        }
                    } else {
                        loadFrame(hourToFilename(hour));
                    }
                    loadFrame(hourToArrowsFilename(hour));
                }
            }

            let currentArrows = EMPTY_FC; // drives the hover readout
            let updateToken = 0;
            async function updateMap(index) {
                currentIndex = index;
                const hours = forecastHours[index];
                updateTimeDisplay(hours);

                const token = ++updateToken;
                const wantHeatmap = wantsHeatmap();
                let [heatUrl, arrows] = await Promise.all([
                    wantHeatmap ? loadImageFrame(hourToHeatmapFilename(hours)) : null,
                    loadFrame(hourToArrowsFilename(hours)),
                ]);
                // Contours are the fallback when there is no heatmap (older
                // pipeline runs, or a missing hour in the current one).
                let contours = null;
                if (!wantHeatmap || !heatUrl) {
                    contours = await loadFrame(hourToFilename(hours));
                }
                if (token !== updateToken) return; // superseded by a newer frame

                currentArrows = arrows;
                // Don't gate this on map.isStyleLoaded(): it reports false
                // whenever the style has pending work (tiles still streaming
                // in on first load), which silently dropped the first frame.
                // setData/updateImage on our own sources are safe regardless.
                if (swellLayersReady) {
                    const arrowSource = map.getSource('arrows');
                    if (arrowSource) arrowSource.setData(arrows);
                    const contourSource = map.getSource('contours');
                    if (contourSource) contourSource.setData(contours || EMPTY_FC);
                    if (wantHeatmap && heatUrl) {
                        showHeatmapFrame(heatUrl);
                    } else if (wantHeatmap) {
                        // missing frame: hide the stale image, contours took over
                        hideHeatmapLayers();
                    } else {
                        hideHeatmapLayers();
                    }
                    // Nearshore overlays follow the global frame. Runs after
                    // hideHeatmapLayers so a covered hour can still show its
                    // regional frame over the contour fallback.
                    await updateNwpsFrames(hours, token, wantHeatmap);
                    if (token !== updateToken) return;
                }
                prefetchFrames(index);
            }

            function stepForward() {
                const nextIndex = (currentIndex + 1) % forecastHours.length;
                timeSlider.value = nextIndex;
                updateMap(nextIndex);
            }

            const PLAY_ICON = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
            const PAUSE_ICON = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 4h4v16H6V4zm8 0h4v16h-4V4z"/></svg>';

            playButton.addEventListener('click', () => {
                isPlaying = !isPlaying;
                playButton.innerHTML = isPlaying ? PAUSE_ICON : PLAY_ICON;
                playButton.title = isPlaying ? 'Pause forecast' : 'Play forecast';

                if (isPlaying) {
                    animationInterval = setInterval(() => {
                        stepForward();
                    }, 500); // Update every 500ms
                } else {
                    clearInterval(animationInterval);
                }
            });

            timeSlider.addEventListener('input', (event) => {
                const index = parseInt(event.target.value, 10);
                updateMap(index);
                if (isPlaying) {
                    clearInterval(animationInterval);
                    isPlaying = false;
                    playButton.innerHTML = PLAY_ICON;
                    playButton.title = 'Play forecast';
                }
            });

            if (map.isStyleLoaded()) {
                initializeSwellMap();
            } else {
                map.once('load', initializeSwellMap);
            }

            //center the map
            map.setCenter([-119.069824, 33.101608]);
            map.setZoom(3);




            async function addBuoyToFavorites(stationId) {
                const user = openSwellsAuth.auth.currentUser;
                if (!user) {
                    alert('Please sign in to add favorites');
                    return;
                }
                try {
                    const response = await authFetch(`/api/favorites/${stationId}`, { method: 'POST' });
                    if (!response.ok) {
                        throw new Error('Failed to add buoy to favorites');
                    }
                    alert('Buoy added to favorites');
                } catch (error) {
                    console.error('Error:', error);
                    alert('Failed to add buoy to favorites');
                }
            }


            // Function to update favorite button appearance (buoy popups
            // carry data-station-id, spot popups data-spot-id)
            function updateFavoriteButton(button) {
                const isFavorite = button.dataset.spotId
                    ? userSpots.includes(button.dataset.spotId)
                    : userBuoys.includes(button.dataset.stationId);
                button.textContent = isFavorite ? '−' : '+';
                button.title = isFavorite ? 'Remove from favorites' : 'Add to favorites';
                button.classList.toggle('is-favorite', isFavorite);
            }

            // Create a MutationObserver to watch for new buttons
            const observer = new MutationObserver(mutations => {
                mutations.forEach(mutation => {
                    mutation.addedNodes.forEach(node => {
                        if (node.nodeType === 1) { // ELEMENT_NODE
                            const favButtons = node.getElementsByClassName('favorite-btn');
                            Array.from(favButtons).forEach(updateFavoriteButton);
                        }
                    });
                });
            });

            // Start observing the document with the configured parameters
            observer.observe(document.body, { childList: true, subtree: true });

            function createPopupContent(buoy) {
                return `
                <div class="buoy-popup">
                    <div class="buoy-popup-name">${buoy.name}</div>
                    <div class="buoy-popup-meta"><span class="search-badge search-badge-buoy">Buoy</span><span class="buoy-popup-id">${buoy.stationId}</span></div>
                    <div class="buoy-popup-actions">
                        <button
                            onclick="openForecast('${buoy.stationId}')"
                            class="toolbar-button">
                            Report & forecast
                        </button>
                        <button
                            id="fav-${buoy.stationId}"
                            onclick="toggleFavorite('${buoy.stationId}')"
                            data-station-id="${buoy.stationId}"
                            class="favorite-btn">
                        </button>
                    </div>
                </div>`;
            }

            async function plotBuoys() {
                buoyData.forEach(buoy => {
                    // Create a DOM element for the marker
                    const el = document.createElement('div');
                    el.className = 'buoy-marker';
                    el.id = `buoymarker-${buoy.stationId}`;
                    el.title = buoy.name;
                    const dot = document.createElement('div');
                    dot.className = 'buoy-marker-dot';
                    el.appendChild(dot);

                    // Create the popup with unique ID. MapLibre's default
                    // popup max-width (240px) is narrower than the card.
                    const popup = new maplibregl.Popup({
                        offset: 14,
                        maxWidth: '280px'
                    })
                    .setHTML(createPopupContent(buoy));


                    // Create the marker and store references.
                    // MapLibre v3 dropped the legacy Marker(element) signature,
                    // so the element must be passed via options.
                    const marker = new maplibregl.Marker({ element: el })
                        .setLngLat([buoy.longitude, buoy.latitude])
                        .setPopup(popup)
                        .addTo(map);

                    popupMap.set(buoy.stationId, marker);

                    // Store marker reference on the element
                    el._marker = marker;
                });
            }

            async function toggleFavorite(stationId) {
                console.log(`Toggling favorite for station ID: ${stationId}`);
                console.log("user buoys here: ", userBuoys);
                console.log("station id here: ", stationId);
                const user = openSwellsAuth.auth.currentUser;
                if (!user) {
                    alert('Please sign in to manage favorites');
                    return;
                }
                if (userBuoys && userBuoys.includes(stationId)) {
                    if (!window.confirm('Remove this buoy from your favorites?')) return;
                    // Remove from favorites
                    try {
                        const response = await authFetch(`/api/favorites/${stationId}`, { method: 'DELETE' });

                            throw new Error('Failed to remove buoy from favorites');
                        }
                        userBuoys = userBuoys.filter(id => id !== stationId);
                        alert('Buoy removed from favorites');
                    } catch (error) {
                        console.error('Error:', error);
                        alert('Failed to remove buoy from favorites');
                    }
                } else {
                    // Add to favorites
                    try {
                        const response = await authFetch(`/api/favorites/${stationId}`, { method: 'POST' });
                        if (!response.ok) {
                            throw new Error('Failed to add buoy to favorites');
                        }
                        userBuoys.push(stationId);
                        alert('Buoy added to favorites');
                    } catch (error) {
                        console.error('Error:', error);
                        alert('Failed to add buoy to favorites');
                    }

                updateFavoritesMenuCount();

            async function toggleSpotFavorite(spotId) {
                const user = openSwellsAuth.auth.currentUser;
                if (!user) {
                    alert('Please sign in to manage favorites');
                    return;
                }
                const isFavorite = userSpots.includes(spotId);
                if (isFavorite && !window.confirm('Remove this beach from your favorites?')) return;
                try {
                    const response = await authFetch(`/api/spot-favorites/${encodeURIComponent(spotId)}`,
                        { method: isFavorite ? 'DELETE' : 'POST' });
                    if (!response.ok) throw new Error(`${response.status} updating spot favorite`);
