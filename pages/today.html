<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<html class="dark">
    <head>


        <title>OpenSwells;</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <script>
            tailwind.config = {
                darkMode: 'class',
                theme: {
                    extend: {}
                }
            }
        </script>
        <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap');
        

        :root { color-scheme: dark; }
        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif !important; background: #0f1012; color: #e6e6e6; overflow: hidden; }
        /* h-screen is 100vh, which extends under mobile browser chrome and
           hides the bottom controls; the dynamic viewport unit tracks the
           real visible height. */
        body.h-screen { height: 100dvh; }
        /* MapLibre adds .maplibregl-map (position: relative) to the container,
           which defeats Tailwind's absolute/inset-0 — size it explicitly. */
        #map { width: 100%; height: 100%; }
        button, input { letter-spacing: 0; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .surface { background: rgba(24, 25, 28, .96); border: 1px solid #34363b; box-shadow: 0 12px 30px rgba(0,0,0,.24); }
        .icon-button { width: 32px; height: 32px; display: inline-flex; align-items: center; justify-content: center; border: 1px solid transparent; color: #a7a9ae; }
        .icon-button:hover { color: #fff; background: #2a2c30; border-color: #3b3d42; }
        .toolbar-button { height: 32px; display: inline-flex; align-items: center; gap: 7px; padding: 0 10px; border: 1px solid #3b3d42; background: #202125; color: #d6d7da; font-size: 12px; font-weight: 500; }
        .toolbar-button:hover, .toolbar-button[aria-expanded="true"] { background: #2a2c30; color: #fff; }
        #favoritesView { width: min(390px, calc(100vw - 24px)); bottom: calc(0.75rem + env(safe-area-inset-bottom, 0px)); transform: translateX(calc(100% + 24px)); transition: transform 180ms ease; }
        #favoritesView.is-open { transform: translateX(0); }
        #drawerBackdrop { opacity: 0; pointer-events: none; transition: opacity 180ms ease; }
        #drawerBackdrop.is-open { opacity: 1; pointer-events: auto; }
        #forecastModal { opacity: 0; pointer-events: none; transition: opacity 150ms ease; }
        #forecastModal.is-open { opacity: 1; pointer-events: auto; }
        #forecastDialog { transform: translateY(8px) scale(.99); transition: transform 150ms ease; }
        #forecastModal.is-open #forecastDialog { transform: translateY(0) scale(1); }
        .maplibregl-popup { font-family: 'Inter', sans-serif; }
        .maplibregl-popup-content { background: #18191c !important; color: #e6e6e6; border: 1px solid #3b3d42; border-radius: 0 !important; padding: 12px !important; box-shadow: 0 12px 30px rgba(0,0,0,.35) !important; }
        .maplibregl-popup-anchor-bottom .maplibregl-popup-tip,
        .maplibregl-popup-anchor-bottom-left .maplibregl-popup-tip,
        .maplibregl-popup-anchor-bottom-right .maplibregl-popup-tip { border-top-color: #3b3d42 !important; }
        .maplibregl-popup-anchor-top .maplibregl-popup-tip,
        .maplibregl-popup-anchor-top-left .maplibregl-popup-tip,
        .maplibregl-popup-anchor-top-right .maplibregl-popup-tip { border-bottom-color: #3b3d42 !important; }
        .maplibregl-popup-anchor-left .maplibregl-popup-tip { border-right-color: #3b3d42 !important; }
        .maplibregl-popup-anchor-right .maplibregl-popup-tip { border-left-color: #3b3d42 !important; }
        .maplibregl-popup-close-button {
            top: 4px; right: 4px;
            width: 22px; height: 22px;
            display: flex; align-items: center; justify-content: center;
            color: #8b8d93; font-size: 15px; line-height: 1;
            border-radius: 0;
        }
        .maplibregl-popup-close-button:hover { color: #fff; background: #2a2c30; }
        input[type="range"] { accent-color: #5e6ad2; }
        /* MapLibre positions the outer .buoy-marker with an inline transform
           every frame, so the visual dot lives on an inner element — never
           put transforms or transitions on the outer one. */
        .buoy-marker {
            width: 16px; height: 16px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }
        .buoy-marker-dot {
            width: 12px; height: 12px;
            border-radius: 50%;
            background: #5e6ad2;
            border: 2px solid rgba(255, 255, 255, 0.95);
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.45);
            transition: transform 120ms ease, background 120ms ease;
        }
        .buoy-marker:hover .buoy-marker-dot {
            transform: scale(1.35);
            background: #6d78de;
        }
        /* Tide stations: teal diamonds, distinct from the indigo buoy dots.
           Same outer/inner split as .buoy-marker (MapLibre owns the outer
           element's transform). */
        .tide-marker {
            width: 16px; height: 16px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }
        .tide-marker-dot {
            width: 9px; height: 9px;
            background: #15a3a3;
            border: 2px solid rgba(255, 255, 255, 0.95);
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.45);
            transform: rotate(45deg);
            transition: transform 120ms ease, background 120ms ease;
        }
        .tide-marker:hover .tide-marker-dot {
            transform: rotate(45deg) scale(1.35);
            background: #1fc2c2;
        }
        /* Forecast timeline scrubber: a 16-day track with day ticks and a
           sliding playhead. The real <input type="range"> sits invisibly on
           top so dragging/keyboard behavior stays native. */
        .timeline-track { position: relative; height: 44px; flex: 1; min-width: 0; }
        .timeline-track::before {
            content: '';
            position: absolute; left: 0; right: 0; bottom: 15px;
            height: 1px; background: #2c2e33;
        }
        .timeline-track:focus-within { outline: 1px solid #5e6ad2; outline-offset: 3px; }
        .timeline-tick {
            position: absolute; bottom: 15px;
            width: 1px; height: 7px;
            background: #45474d;
            transform: translateX(-0.5px);
            pointer-events: none;
        }
        .timeline-tick-label {
            position: absolute; bottom: 0;
            transform: translateX(-50%);
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px; color: #6f7177;
            white-space: nowrap;
            pointer-events: none;
        }
        .timeline-progress {
            position: absolute; left: 0; bottom: 15px;
            height: 1px; background: #5e6ad2;
            pointer-events: none;
        }
        .timeline-playhead {
            position: absolute; top: 4px; bottom: 12px;
            width: 2px; background: #8f9bff;
            transform: translateX(-1px);
            pointer-events: none;
        }
        .timeline-playhead::after {
            content: '';
            position: absolute; top: -3px; left: 50%;
            transform: translateX(-50%);
            width: 7px; height: 7px;
            background: #8f9bff;
        }
        .timeline-input {
            position: absolute; inset: 0;
            width: 100%; height: 100%;
            opacity: 0; margin: 0;
            cursor: ew-resize;
        }
        @media (max-width: 640px) {
            .timeline-tick-label { display: none; }
            .timeline-track { height: 32px; }
            .timeline-track::before, .timeline-tick, .timeline-progress { bottom: 8px; }
            .timeline-playhead { bottom: 5px; }
        }
        @media (max-width: 767px) { #forecastDialog { width: 100vw; height: 100dvh; max-height: none; border: 0; } }
        /* Keep the bottom bar clear of the iOS home indicator */
        .bottom-controls { bottom: calc(0.75rem + env(safe-area-inset-bottom, 0px)) !important; }
        /* The favorites list must scroll on touch devices */
        #buoy-containers {
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
            touch-action: pan-y;
        }
        </style>
    </head>

            <script>
                function toggleFavorites() {
                    const drawer = document.getElementById('favoritesView');
                    drawer.classList.contains('is-open') ? closeFavorites() : openFavorites();
                }

                function openFavorites() {
                    document.getElementById('favoritesView').classList.add('is-open');
                    document.getElementById('drawerBackdrop').classList.add('is-open');
                    document.getElementById('showFavoritesBtn').setAttribute('aria-expanded', 'true');
                }

                function closeFavorites() {
                    document.getElementById('favoritesView').classList.remove('is-open');
                    document.getElementById('drawerBackdrop').classList.remove('is-open');
                    document.getElementById('showFavoritesBtn').setAttribute('aria-expanded', 'false');
                }

                function openForecast(stationId, stationName = '') {
                    if (!stationId) return;
                    closeFavorites();
                    const modal = document.getElementById('forecastModal');
                    const frame = document.getElementById('forecastFrame');
                    document.getElementById('forecastModalTitle').textContent = stationName || 'Station report & forecast';
                    document.getElementById('forecastStation').textContent = `BUOY ${stationId}`;
                    document.getElementById('forecastLoading').classList.remove('hidden');
                    frame.classList.add('opacity-0');
                    frame.onload = () => {
                        document.getElementById('forecastLoading').classList.add('hidden');
                        frame.classList.remove('opacity-0');
                    };
                    frame.src = `/forecast/${stationId}`;
                    modal.classList.add('is-open');
                }

                function closeForecast() {
                    document.getElementById('forecastModal').classList.remove('is-open');
                }

                document.addEventListener('keydown', (event) => {
                    if (event.key !== 'Escape') return;
                    if (document.getElementById('forecastModal').classList.contains('is-open')) closeForecast();
                    else closeFavorites();
                });

                document.getElementById('forecastModal').addEventListener('click', (event) => {
                    if (event.target.id === 'forecastModal') closeForecast();
                });
            </script>

            const timeClockLabel = document.getElementById('timeClock');
            const timelinePlayhead = document.getElementById('timelinePlayhead');
            const timelineProgress = document.getElementById('timelineProgress');
            const timelineTicks = document.getElementById('timelineTicks');
            const lastForecastHour = forecastHours[forecastHours.length - 1];

            timeSlider.max = forecastHours.length - 1;
            timeSlider.value = 0;

            let currentIndex = 0;
            let isPlaying = false;
            let animationInterval;
            let forecastStartTime;

            function hourToFilename(hour) {

            }

            // Height bands — must match FIXED_LEVELS in gfs_to_contours.py.
            // Storm-scale ramp (weather-map convention): calm blues through
            // green/yellow into red and near-black for extreme swell.
            const SWELL_BANDS = [
                { min: 0,   color: '#a5d5f0', label: '< 0.5' },
                { min: 0.5, color: '#64a8e8', label: '0.5 – 1' },
                { min: 1,   color: '#3178d2', label: '1 – 1.5' },
                { min: 1.5, color: '#15a3a3', label: '1.5 – 2' },
                { min: 2,   color: '#2fb54e', label: '2 – 2.5' },
                { min: 2.5, color: '#a3c520', label: '2.5 – 3' },
                { min: 3,   color: '#f2ce08', label: '3 – 4' },
                { min: 4,   color: '#f59a0b', label: '4 – 5' },
                { min: 5,   color: '#ea4b28', label: '5 – 6' },
                { min: 6,   color: '#b31212', label: '6 – 8' },
                { min: 8,   color: '#4a0a1e', label: '8+' },
            ];

            const fillColorExpression = ['step', ['get', 'contour_mean'], SWELL_BANDS[0].color];
            for (const band of SWELL_BANDS.slice(1)) {
                fillColorExpression.push(band.min, band.color);
            }

            // Legend rows, highest band on top
            const legendBands = document.getElementById('legendBands');
            [...SWELL_BANDS].reverse().forEach(band => {
                const row = document.createElement('div');
                row.className = 'flex items-center gap-2';

                    `<span class="text-xs dark:text-white">${band.label}</span>`;
                legendBands.appendChild(row);
            });

            const EMPTY_FC = { type: 'FeatureCollection', features: [] };

            function makeArrowImage(size = 44) {
                const canvas = document.createElement('canvas');
                canvas.width = canvas.height = size;
                const ctx = canvas.getContext('2d');
                ctx.translate(size / 2, size / 2);
                // Arrow points up (north); icon-rotate spins it per feature.
                const s = size / 2;
                ctx.beginPath();
                ctx.moveTo(0, -s * 0.8);
                ctx.lineTo(s * 0.38, -s * 0.15);
                ctx.lineTo(s * 0.12, -s * 0.15);
                ctx.lineTo(s * 0.12, s * 0.8);
                ctx.lineTo(-s * 0.12, s * 0.8);
                ctx.lineTo(-s * 0.12, -s * 0.15);
                ctx.lineTo(-s * 0.38, -s * 0.15);
                ctx.closePath();
                ctx.lineWidth = 3;
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.9)';
                ctx.stroke();
                ctx.fillStyle = 'rgba(11, 11, 11, 0.8)';
                ctx.fill();
                return ctx.getImageData(0, 0, size, size);
            }

            function addSwellLayers() {
                for (const layer of ['hillshade', 'contour-fills', 'swell-arrows']) {
                    if (map.getLayer(layer)) map.removeLayer(layer);
                }
                for (const source of ['terrain-dem', 'contours', 'arrows']) {
                    if (map.getSource(source)) map.removeSource(source);
                }

                // Terrain relief under the swell layers (free AWS open data).
                // The contours no longer cover land, so this gives the land
                // its geography back.
                map.addSource('terrain-dem', {
                    type: 'raster-dem',
                    tiles: ['https://s3.amazonaws.com/elevation-tiles-prod/terrarium/{z}/{x}/{y}.png'],
                    encoding: 'terrarium',
                    tileSize: 256,
                    maxzoom: 12,
                    attribution: 'Terrain tiles: Mapzen / AWS Open Data'
                });
                map.addLayer({
                    id: 'hillshade',
                    type: 'hillshade',
                    source: 'terrain-dem',
                    paint: {
                        'hillshade-exaggeration': 0.35,
                        'hillshade-shadow-color': 'rgba(0, 0, 0, 0.35)',
                        'hillshade-highlight-color': 'rgba(255, 255, 255, 0.25)'
                    }
                });

                map.addSource('contours', { type: 'geojson', data: EMPTY_FC });
                map.addSource('arrows', { type: 'geojson', data: EMPTY_FC });

                map.addLayer({
                    id: 'contour-fills',
                    type: 'fill',
                    source: 'contours',
                    paint: {
                        'fill-color': fillColorExpression,
                        'fill-opacity': 0.75,
                        'fill-outline-color': 'rgba(0, 0, 0, 0.12)'
                    }
                });

                if (!map.hasImage('swell-arrow')) {
                    map.addImage('swell-arrow', makeArrowImage(), { pixelRatio: 2 });
                }
                map.addLayer({
                    id: 'swell-arrows',
                    type: 'symbol',
                    source: 'arrows',
                    layout: {
                        'icon-image': 'swell-arrow',
                        // d = direction the swell comes FROM; point where it's going
                        'icon-rotate': ['+', ['get', 'd'], 180],
                        'icon-rotation-alignment': 'map',
                        // collision detection thins arrows out at low zoom
                        'icon-allow-overlap': false,
                        'icon-padding': 4,
                        'icon-size': ['interpolate', ['linear'], ['zoom'], 2, 0.45, 5, 0.7, 8, 1.0],
                    },
                    paint: { 'icon-opacity': 0.85 },
                });
                const arrowsToggle = document.getElementById('arrowsToggle');
                if (arrowsToggle && !arrowsToggle.checked) {
                    map.setLayoutProperty('swell-arrows', 'visibility', 'none');
                }

            }

            // --- Heatmap rendering -------------------------------------------
            // The pipeline pre-renders each hour's height field as a Mercator
            // PNG (heatmap_XXX.png); metadata.json carries the corner bounds.
            // Two image sources ping-pong with an opacity transition so frame
            // changes crossfade instead of popping. The contour polygons stay
            // as a fallback when a run has no heatmaps.
            const HEATMAP_OPACITY = 0.85;
            const HEATMAP_FADE_MS = 550;
            const HEATMAP_OVERLAP_MS = 180;
            const TRANSPARENT_PX =
                'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNgYGD4DwABBAEAX+XLSgAAAABJRU5ErkJggg==';
            let heatmapBounds = null; // set from metadata.json
            let heatmapReady = false;
            let swellLayersReady = false;
            let activeHeatLayer = 'b';
            let firstHeatmapFrameShown = false;
            let heatmapTransitionToken = 0;
            let swellRenderMode = 'heatmap';

            function wantsHeatmap() {
                return swellRenderMode === 'heatmap' && heatmapReady;
            }

            function isGlobalZeroTo360(bounds) {
                return bounds && bounds.west >= 0 && bounds.east > 180 && (bounds.east - bounds.west) > 300;
            }

            function displayHeatmapBounds(bounds) {
                if (!isGlobalZeroTo360(bounds)) {
                    return bounds;
                }
                return {
                    west: -180,
                    east: 180,
                    north: bounds.north,
                    south: bounds.south,
                };
            }

            async function rollHeatmapBlob(blob) {
                if (!isGlobalZeroTo360(heatmapBounds)) {
                    return URL.createObjectURL(blob);
                }

                try {
                    const bitmap = await createImageBitmap(blob);
                    const canvas = document.createElement('canvas');
                    canvas.width = bitmap.width;
                    canvas.height = bitmap.height;
                    const ctx = canvas.getContext('2d');
                    const halfWidth = Math.floor(bitmap.width / 2);
                    const rightWidth = bitmap.width - halfWidth;

                    // Source PNGs are 0..360 longitude. Roll 180..360 to the left
                    // so the image aligns with the map's -180..180 initial world.
                    ctx.drawImage(bitmap, halfWidth, 0, rightWidth, bitmap.height, 0, 0, rightWidth, bitmap.height);
                    ctx.drawImage(bitmap, 0, 0, halfWidth, bitmap.height, rightWidth, 0, halfWidth, bitmap.height);

                    if (bitmap.close) bitmap.close();
                    const shiftedBlob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
                    return URL.createObjectURL(shiftedBlob || blob);
                } catch (error) {
                    console.warn('Unable to normalize heatmap longitude; using original PNG.', error);
                    return URL.createObjectURL(blob);
                }
            }

            function decodeImageUrl(url) {
                return new Promise(resolve => {
                    const img = new Image();
                    img.onload = () => resolve(url);
                    img.onerror = () => resolve(url);
                    img.src = url;
                    if (img.decode) {
                        img.decode().then(() => resolve(url)).catch(() => resolve(url));
                    }
                });
            }

            function hideHeatmapLayers() {
                heatmapTransitionToken++;
                firstHeatmapFrameShown = false;
                for (const layer of ['heatmap-a', 'heatmap-b']) {
                    if (map.getLayer(layer)) {
                        map.setPaintProperty(layer, 'raster-opacity', 0);
                    }
                }
            }

            function maybeAddHeatmapLayers() {
                // Needs both the style (contour-fills exists) and the bounds.
                if (heatmapReady || !heatmapBounds || !map.getLayer('contour-fills')) {
                    return;
                }
                const bounds = displayHeatmapBounds(heatmapBounds);
                const coords = [
                    [bounds.west, bounds.north],
                    [bounds.east, bounds.north],
                    [bounds.east, bounds.south],
                    [bounds.west, bounds.south],
                ];
                for (const key of ['a', 'b']) {
                    map.addSource(`heatmap-${key}`, {
                        type: 'image',
                        url: TRANSPARENT_PX,
                        coordinates: coords,
                    });
                    map.addLayer({
                        id: `heatmap-${key}`,
                        type: 'raster',
                        source: `heatmap-${key}`,
                        paint: {
                            'raster-opacity': 0,
                            'raster-opacity-transition': { duration: HEATMAP_FADE_MS },
                            'raster-resampling': 'linear',
                            'raster-fade-duration': 0,
                        },
                    }, 'contour-fills'); // below the (empty) contour fallback
                }
                heatmapReady = true;
                if (wantsHeatmap()) {
                    const contourSource = map.getSource('contours');
                    if (contourSource) contourSource.setData(EMPTY_FC);
                }
                updateMap(currentIndex);
            }

            const FRAME_CACHE_MAX = 48;

            // Heatmap frames are fetched as blobs into an LRU of object URLs.
            const imageCache = new Map(); // url -> Promise<objectURL|null>

            function loadImageFrame(url) {
                if (imageCache.has(url)) {
                    const cached = imageCache.get(url);
                    imageCache.delete(url);
                    imageCache.set(url, cached);
                    return cached;
                }
                const promise = fetch(url)
                    .then(r => {
                        if (!r.ok) throw new Error(`${r.status} for ${url}`);
                        return r.blob();
                    })
                    .then(blob => rollHeatmapBlob(blob))
                    .then(url => decodeImageUrl(url))
                    .catch(() => null); // missing hour: fall back to contours
                imageCache.set(url, promise);
                if (imageCache.size > FRAME_CACHE_MAX) {
                    const oldest = imageCache.keys().next().value;
                    imageCache.get(oldest).then(u => u && URL.revokeObjectURL(u));
                    imageCache.delete(oldest);
                }
                return promise;
            }

            function showHeatmapFrame(url) {
                const next = activeHeatLayer === 'a' ? 'b' : 'a';
                const previous = activeHeatLayer;
                const token = ++heatmapTransitionToken;

                map.getSource(`heatmap-${next}`).updateImage({ url });

                if (!firstHeatmapFrameShown) {
                    map.setPaintProperty(`heatmap-${previous}`, 'raster-opacity', 0);
                    map.setPaintProperty(`heatmap-${next}`, 'raster-opacity', HEATMAP_OPACITY);
                    activeHeatLayer = next;
                    firstHeatmapFrameShown = true;
                    return;
                }

                // Keep the current frame visible briefly while the next image
                // source is uploaded, then overlap the fades to avoid a flash.
                requestAnimationFrame(() => {
                    requestAnimationFrame(() => {
                        if (token !== heatmapTransitionToken) return;
                        map.setPaintProperty(`heatmap-${next}`, 'raster-opacity', HEATMAP_OPACITY);
                        window.setTimeout(() => {
                            if (token !== heatmapTransitionToken) return;
                            map.setPaintProperty(`heatmap-${previous}`, 'raster-opacity', 0);
                        }, HEATMAP_OVERLAP_MS);
                    });
                });
                activeHeatLayer = next;
            }

            function initializeSwellMap() {
                addSwellLayers();
                swellLayersReady = true;
                // Find the first symbol layer and slot the swell layers beneath
                // it so place labels stay readable. Fills sit under arrows.
                let firstSymbolId;
                for (const layer of map.getStyle().layers) {
                    if (layer.type === 'symbol') {
                        firstSymbolId = layer.id;
                        break;
                    }
                }
                // Bottom-to-top: hillshade, swell fills, arrows, then labels.
                map.moveLayer('swell-arrows', firstSymbolId);
                map.moveLayer('contour-fills', 'swell-arrows');
                map.moveLayer('hillshade', 'contour-fills');
                maybeAddHeatmapLayers(); // if metadata arrived before the style
                updateMap(currentIndex);
            }

            // Hover readout in the legend. In heatmap mode the value comes
            // from the nearest arrow grid point (exact height); in contour
            // fallback mode it comes from the hovered polygon's band.
            const legendReadout = document.getElementById('legendReadout');

            map.on('mousemove', (e) => {
                if (!legendReadout || !wantsHeatmap()) return;
                const lng = e.lngLat.lng;
                const lat = e.lngLat.lat;
                let best = null;
                let bestDist = 4; // squared degrees; ~2 deg search radius
                for (const f of currentArrows.features) {
                    const [flng, flat] = f.geometry.coordinates;
                    const dlng = Math.min(Math.abs(flng - lng), 360 - Math.abs(flng - lng));
                    const dist = dlng * dlng + (flat - lat) * (flat - lat);
                    if (dist < bestDist) {
                        bestDist = dist;
                        best = f;
                    }
                }
                legendReadout.textContent = best
                    ? `${best.properties.h} m at cursor`
                    : '';
            });

            map.on('mousemove', 'contour-fills', (e) => {
                if (!legendReadout || wantsHeatmap()) return;
                if (!e.features || !e.features.length) return;
                const p = e.features[0].properties;
                legendReadout.textContent = p.contour_max >= 20
                    ? `≥ ${p.contour_min} m at cursor`
                    : `${p.contour_min} – ${p.contour_max} m at cursor`;
            });
            map.on('mouseleave', 'contour-fills', () => {
                if (legendReadout && !wantsHeatmap()) legendReadout.textContent = '';
            });

            function nearestPointFeature(features, lngLat, maxDist2 = 4) {
                let best = null;
                let bestDist = maxDist2; // squared degrees
                for (const f of features) {
                    const [flng, flat] = f.geometry.coordinates;
                    const dlng = Math.min(Math.abs(flng - lngLat.lng), 360 - Math.abs(flng - lngLat.lng));
                    const dist = dlng * dlng + (flat - lngLat.lat) * (flat - lngLat.lat);
                    if (dist < bestDist) {
                        bestDist = dist;
                        best = f;
                    }
                }
                return best;
            }

            // Hovering an arrow shows the full swell reading; the individual
            // swell systems from swell_partitions_XXX.geojson stream in once
            // that frame is cached.
            const arrowPopup = new maplibregl.Popup({
                closeButton: false,
                closeOnClick: false,
                offset: 12,
            });
            map.on('mouseenter', 'swell-arrows', (e) => {
                const p = e.features[0].properties;
                const lngLat = e.lngLat;
                const base = `<div class="text-xs">${p.h} m @ ${p.p} s from ${p.d}&deg;</div>`;
                arrowPopup.setLngLat(lngLat).setHTML(base).addTo(map);

                loadFrame(hourToPartitionsFilename(forecastHours[currentIndex])).then(fc => {
                    if (!arrowPopup.isOpen() || !fc.features || !fc.features.length) return;
                    const f = nearestPointFeature(fc.features, lngLat);
                    if (!f) return;
                    const rows = [];
                    for (let k = 1; k <= 3; k++) {
                        const h = f.properties[`h${k}`];
                        if (h === undefined) continue;
                        rows.push(`<div class="text-xs" style="color: #c6c7ca;">${h} m @ ${f.properties[`p${k}`]} s from ${f.properties[`d${k}`]}&deg;</div>`);
                    }
                    if (rows.length > 1) {
                        arrowPopup.setHTML(base +
                            `<div class="mono" style="margin: 6px 0 2px; font-size: 9px; color: #8b8d93; text-transform: uppercase;">Swell systems</div>` +
                            rows.join(''));
                    }
                });
            });
            map.on('mouseleave', 'swell-arrows', () => arrowPopup.remove());

            // Wind arrows: hover shows speed (converted to mph) and origin
            document.getElementById('arrowsToggle').addEventListener('change', (e) => {
                if (map.getLayer('swell-arrows')) {
                    map.setLayoutProperty('swell-arrows', 'visibility',
                        e.target.checked ? 'visible' : 'none');
                }
            });

            document.getElementById('heatmapToggle').addEventListener('change', (e) => {
                swellRenderMode = e.target.checked ? 'heatmap' : 'contours';
                legendReadout.textContent = '';
                updateMap(currentIndex);
            });

            // Fetch metadata and initialize time display
            async function fetchMetadata() {
                try {
                    const response = await fetch('/static/metadata.json'); // Use local file
                    if (!response.ok) {
                        throw new Error('Failed to fetch metadata');
                    }
                    const metadata = await response.json();
                    const timestamp = new Date(metadata.timestamp);
                    
                    const [datePart, timePart] = metadata.forecast_start.split('_');
                    const year = datePart.substring(0, 4);
                    const month = datePart.substring(4, 6);
                    const day = datePart.substring(6, 8);
                    const hour = timePart.substring(0, 2);
                    
                    forecastStartTime = new Date(Date.UTC(year, month - 1, day, hour));

                    if (metadata.heatmap_bounds) {
                        heatmapBounds = metadata.heatmap_bounds;
                        maybeAddHeatmapLayers();
                    }

                    document.getElementById('metadataTimestamp').textContent = timestamp.toLocaleString();
                    buildTimelineTicks(); // labels need forecastStartTime
                    updateTimeDisplay(forecastHours[currentIndex]);
                } catch (error) {
                    console.error('Error fetching metadata:', error);
                    document.getElementById('metadataTimestamp').textContent = 'Unable to load timestamp';
                }
            }
            const metadataReady = fetchMetadata();

            const dayFormatter = new Intl.DateTimeFormat(undefined, {
                weekday: 'short',
                month: 'short',
                day: 'numeric',
            });
            const clockFormatter = new Intl.DateTimeFormat(undefined, {
                hour: 'numeric',
                minute: '2-digit',
                hour12: true,
            });
            const tickFormatter = new Intl.DateTimeFormat(undefined, {
                weekday: 'short',
                day: 'numeric',
            });

            function updateTimeDisplay(hours) {
                const pct = (hours / lastForecastHour) * 100;
                timelinePlayhead.style.left = `${pct}%`;
                timelineProgress.style.width = `${pct}%`;

                if (!forecastStartTime) {
                    return;
                }

                const currentTime = new Date(
                    forecastStartTime.getTime() + hours * 60 * 60 * 1000
                );
                timeDayLabel.textContent = dayFormatter.format(currentTime);
                timeClockLabel.textContent = clockFormatter.format(currentTime);
            }

            // One tick per forecast day; a label on every other tick keeps
            // the track readable at narrow widths.
            function buildTimelineTicks() {
                timelineTicks.innerHTML = '';
                for (let hour = 24; hour < lastForecastHour; hour += 24) {
                    const pct = (hour / lastForecastHour) * 100;
                    const tick = document.createElement('div');
                    tick.className = 'timeline-tick';
                    tick.style.left = `${pct}%`;
                    timelineTicks.appendChild(tick);

                    if (forecastStartTime && (hour / 24) % 2 === 0) {
                        const label = document.createElement('div');
                        label.className = 'timeline-tick-label';
                        label.style.left = `${pct}%`;
                        label.textContent = tickFormatter.format(new Date(
                            forecastStartTime.getTime() + hour * 60 * 60 * 1000
                        ));
                        timelineTicks.appendChild(label);
                    }
                }
            }
            buildTimelineTicks();

            // Parsed frames are cached (LRU) and the next few hours prefetched,
            // so scrubbing and playback don't wait on the network per frame.
            const frameCache = new Map(); // url -> Promise<geojson>

            function loadFrame(url) {
                if (frameCache.has(url)) {
                    const cached = frameCache.get(url);
                    frameCache.delete(url);
                    frameCache.set(url, cached); // refresh LRU position
                    return cached;
                }
                const promise = fetch(url)
                    .then(r => {
                        if (!r.ok) throw new Error(`${r.status} for ${url}`);
                        return r.json();
                    })
                    // A missing hour clears the layer instead of breaking playback
                    .catch(() => EMPTY_FC);
                frameCache.set(url, promise);
                if (frameCache.size > FRAME_CACHE_MAX) {
                    frameCache.delete(frameCache.keys().next().value);
                }
                return promise;
            }

            function prefetchFrames(index, count = 4) {
                for (let i = 1; i <= count; i++) {
                    const hour = forecastHours[(index + i) % forecastHours.length];
                    if (wantsHeatmap()) {
                        loadImageFrame(hourToHeatmapFilename(hour));
                    } else {
                        loadFrame(hourToFilename(hour));
                    }
                    loadFrame(hourToArrowsFilename(hour));
                }
            }

            let currentArrows = EMPTY_FC; // drives the hover readout
            let updateToken = 0;
            async function updateMap(index) {
                currentIndex = index;
                const hours = forecastHours[index];
                updateTimeDisplay(hours);

                const token = ++updateToken;
                const wantHeatmap = wantsHeatmap();
                let [heatUrl, arrows] = await Promise.all([
                    wantHeatmap ? loadImageFrame(hourToHeatmapFilename(hours)) : null,
                    loadFrame(hourToArrowsFilename(hours)),
                ]);
                // Contours are the fallback when there is no heatmap (older
                // pipeline runs, or a missing hour in the current one).
                let contours = null;
                if (!wantHeatmap || !heatUrl) {
                    contours = await loadFrame(hourToFilename(hours));
                }
                if (token !== updateToken) return; // superseded by a newer frame

                currentArrows = arrows;
                // Don't gate this on map.isStyleLoaded(): it reports false
                // whenever the style has pending work (tiles still streaming
                // in on first load), which silently dropped the first frame.
                // setData/updateImage on our own sources are safe regardless.
                if (swellLayersReady) {
                    const arrowSource = map.getSource('arrows');
                    if (arrowSource) arrowSource.setData(arrows);
                    const contourSource = map.getSource('contours');
                    if (contourSource) contourSource.setData(contours || EMPTY_FC);
                    if (wantHeatmap && heatUrl) {
                        showHeatmapFrame(heatUrl);
                    } else if (wantHeatmap) {
                        // missing frame: hide the stale image, contours took over
                        hideHeatmapLayers();
                    } else {
                        hideHeatmapLayers();
                    }
                }
                prefetchFrames(index);
            }

            function stepForward() {
                const nextIndex = (currentIndex + 1) % forecastHours.length;
                timeSlider.value = nextIndex;
                updateMap(nextIndex);
            }

            const PLAY_ICON = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
            const PAUSE_ICON = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 4h4v16H6V4zm8 0h4v16h-4V4z"/></svg>';

            playButton.addEventListener('click', () => {
                isPlaying = !isPlaying;
                playButton.innerHTML = isPlaying ? PAUSE_ICON : PLAY_ICON;
                playButton.title = isPlaying ? 'Pause forecast' : 'Play forecast';

                if (isPlaying) {
                    animationInterval = setInterval(() => {
                        stepForward();
                    }, 500); // Update every 500ms
                } else {
                    clearInterval(animationInterval);
                }
            });

            timeSlider.addEventListener('input', (event) => {
                const index = parseInt(event.target.value, 10);
                updateMap(index);
                if (isPlaying) {
                    clearInterval(animationInterval);
                    isPlaying = false;
                    playButton.innerHTML = PLAY_ICON;
                    playButton.title = 'Play forecast';
                }
            });

            if (map.isStyleLoaded()) {
                initializeSwellMap();
            } else {
                map.once('load', initializeSwellMap);
            }

            //center the map
            map.setCenter([-119.069824, 33.101608]);
            map.setZoom(3);




            async function addBuoyToFavorites(stationId) {
                const user = firebase.auth().currentUser;
                if (!user) {
                    alert('Please sign in to add favorites');
                    return;
                }
                try {
                    const response = await authFetch(`/api/favorites/${stationId}`, { method: 'POST' });
                    if (!response.ok) {
                        throw new Error('Failed to add buoy to favorites');
                    }
                    alert('Buoy added to favorites');
                } catch (error) {
                    console.error('Error:', error);
                    alert('Failed to add buoy to favorites');
                }
            }


            // Function to update favorite button appearance
            function updateFavoriteButton(button) {
                const stationId = button.dataset.stationId;
                const isFavorite = userBuoys.includes(stationId);
                button.textContent = isFavorite ? '−' : '+';
                button.title = isFavorite ? 'Remove from favorites' : 'Add to favorites';
                button.className = `favorite-btn h-10 w-10 flex items-center justify-center text-lg font-semibold border border-[#3b3d42] bg-[#202125] ${
                    isFavorite ? 'text-[#e06c75] hover:bg-[#34363b]' : 'text-[#6fcf97] hover:bg-[#34363b]'
                }`;
            }

            // Create a MutationObserver to watch for new buttons
            const observer = new MutationObserver(mutations => {
                mutations.forEach(mutation => {
                    mutation.addedNodes.forEach(node => {
                        if (node.nodeType === 1) { // ELEMENT_NODE
                            const favButtons = node.getElementsByClassName('favorite-btn');
                            Array.from(favButtons).forEach(updateFavoriteButton);
                        }
                    });
                });
            });

            // Start observing the document with the configured parameters
            observer.observe(document.body, { childList: true, subtree: true });

            function createPopupContent(buoy) {
                return `
                <div class="w-[230px]">
                    <div class="text-[13px] font-medium text-white leading-snug break-words mb-1 pr-4">${buoy.name}</div>
                    <div class="mono text-[10px] text-[#8b8d93] mb-3">BUOY ${buoy.stationId}</div>
                    <div class="flex gap-1.5">
                        <button
                            onclick="openForecast('${buoy.stationId}')"
                            class="toolbar-button !h-10 flex-1 justify-center">
                            Report & forecast
                        </button>
                        <button
                            id="fav-${buoy.stationId}"
                            onclick="toggleFavorite('${buoy.stationId}')"
                            data-station-id="${buoy.stationId}"
                            class="favorite-btn h-10 w-10 flex items-center justify-center text-lg font-semibold border border-[#3b3d42] bg-[#202125]">
                        </button>
                    </div>
                </div>`;
            }

            async function plotBuoys() {
                buoyData.forEach(buoy => {
                    // Create a DOM element for the marker
                    const el = document.createElement('div');
                    el.className = 'buoy-marker';
                    el.id = `buoymarker-${buoy.stationId}`;
                    el.title = buoy.name;
                    const dot = document.createElement('div');
                    dot.className = 'buoy-marker-dot';
                    el.appendChild(dot);

                    // Create the popup with unique ID. MapLibre's default
                    // popup max-width (240px) is narrower than the card.
                    const popup = new maplibregl.Popup({
                        offset: 14,
                        maxWidth: '280px'
                    })
                    .setHTML(createPopupContent(buoy));


                    // Create the marker and store references.
                    // MapLibre v3 dropped the legacy Marker(element) signature,
                    // so the element must be passed via options.
                    const marker = new maplibregl.Marker({ element: el })
                        .setLngLat([buoy.longitude, buoy.latitude])
                        .setPopup(popup)
                        .addTo(map);

                    popupMap.set(buoy.stationId, marker);

                    // Store marker reference on the element
                    el._marker = marker;
                });
            }

            async function toggleFavorite(stationId) {
                console.log(`Toggling favorite for station ID: ${stationId}`);
                console.log("user buoys here: ", userBuoys);
                console.log("station id here: ", stationId);
                const user = firebase.auth().currentUser;
                if (!user) {
                    alert('Please sign in to manage favorites');
                    return;
                }
                if (userBuoys && userBuoys.includes(stationId)) {
                    // Remove from favorites
                    try {
                        const response = await authFetch(`/api/favorites/${stationId}`, { method: 'DELETE' });
                        if (!response.ok) {
                            throw new Error('Failed to remove buoy from favorites');
                        }
                        userBuoys = userBuoys.filter(id => id !== stationId);
                        alert('Buoy removed from favorites');
                    } catch (error) {
                        console.error('Error:', error);
                        alert('Failed to remove buoy from favorites');
                    }
                } else {
                    // Add to favorites
                    try {
                        const response = await authFetch(`/api/favorites/${stationId}`, { method: 'POST' });
                        if (!response.ok) {
                            throw new Error('Failed to add buoy to favorites');
                        }
                        userBuoys.push(stationId);
                        alert('Buoy added to favorites');
                    } catch (error) {
                        console.error('Error:', error);
                        alert('Failed to add buoy to favorites');
                    }
                }

                // Refresh the favorites display and update popup content
                await loadForecastSummary();
            }


            // Stations reporting spectral wave data, refreshed daily from
            // NDBC by the server (see stations.go). Markers and search stay
            // empty until the list arrives.
            let currentBuoy = {};
            let buoyData = [];

            async function loadBuoyStations() {
                try {
                    const response = await fetch('/api/buoys');
                    if (!response.ok) throw new Error(`${response.status} from /api/buoys`);
                    buoyData = await response.json();
                    plotBuoys();
                } catch (error) {
                    console.error('Failed to load station list:', error);
                }
            }

            const searchInput = document.getElementById('searchInput');

            searchInput.addEventListener('input', function(e) {
                const searchTerm = e.target.value.trim().toLowerCase();
                if (!searchTerm) {
                    document.getElementById('searchResults').innerHTML = '';
                    return;
                }
                let matches = buoyData.filter(buoy =>
                    buoy.name.toLowerCase().includes(searchTerm) || buoy.stationId.includes(searchTerm));
                displayMatches(matches);
            });

            // "/" focuses the search from anywhere; Escape clears and blurs it
            document.addEventListener('keydown', (e) => {
                if (e.key === '/' && document.activeElement !== searchInput &&
                    !['INPUT', 'TEXTAREA'].includes(document.activeElement.tagName)) {
                    e.preventDefault();
                    searchInput.focus();
                } else if (e.key === 'Escape' && document.activeElement === searchInput) {
                    searchInput.value = '';
                    document.getElementById('searchResults').innerHTML = '';
                    searchInput.blur();
                }
            });

            function displayMatches(matches) {
                const searchResults = document.getElementById('searchResults');
                searchResults.innerHTML = ''; // Clear previous results

                if (!matches.length) {
                    const empty = document.createElement('div');
                    empty.className = 'px-3 py-2.5 text-xs text-[#8b8d93]';
                    empty.textContent = 'No stations found';
                    searchResults.appendChild(empty);
                    return;
                }

                matches.forEach(match => {
                    const div = document.createElement('div');
                    div.className = 'flex items-center justify-between gap-3 px-3 py-2 cursor-pointer border-b border-[#26272b] last:border-b-0 hover:bg-[#2a2c30]';
                    div.innerHTML =
                        `<span class="text-[13px] text-[#d6d7da] truncate">${match.name}</span>` +
                        `<span class="mono text-[10px] text-[#8b8d93] shrink-0">${match.stationId}</span>`;
                    div.onclick = function () {
                        searchResults.innerHTML = '';
                        searchInput.value = match.name;
                        currentBuoy = match;

                        console.log(`Jumping to buoy: ${match.stationId}`);

                        // Retrieve the marker from markerMap
                        const marker = popupMap.get(match.stationId);
                        console.log(marker)

                        if (marker) {
                            // Trigger the popup
                            marker.togglePopup();

                            // Center the map on the marker with an offset
                            map.flyTo({
                                center: [match.longitude, match.latitude],
                                zoom: 4,
                                offset: [0, -100], // Offset to account for the popup
                            });
                        } else {
                            console.warn(`No marker found for stationId: ${match.stationId}`);
                        }
                    };
                    searchResults.appendChild(div);
                });
            }



            // Clicking outside the search box hides the results
            window.addEventListener('click', function(e) {
                if (!document.getElementById('searchBox').contains(e.target)) {
                    document.getElementById('searchResults').innerHTML = '';
                }
            });

            //center the map
            map.setCenter([-119.069824, 33.101608]);
            map.setZoom(3);

            // --- Tide stations (NOAA CO-OPS, from tides.json) ------------
            // tides.json: { stations: [{ id, name, lat, lon, predictions:
            // [{t, v}], observations: [{t, v}] }], errors: [...] }. Heights
            // are meters MLLW, timestamps UTC. Absent file = no tide layer.
            function tideDate(t) {
                return new Date(t.replace(' ', 'T') + 'Z');
            }

            const M_TO_FT = 3.28084;

            function tidePopupHTML(st) {
                const now = Date.now();
                const preds = (st.predictions || []).map(e => ({ t: tideDate(e.t).getTime(), v: parseFloat(e.v) }));
                const obs = (st.observations || []).map(e => ({ t: tideDate(e.t).getTime(), v: parseFloat(e.v) }));

                let html = `<div class="w-[250px]">
                    <div class="text-[13px] font-medium text-white leading-snug mb-1 pr-4">${st.name || 'Tide station'}</div>
                    <div class="mono text-[10px] text-[#8b8d93] mb-2">TIDE ${st.id} &middot; MLLW</div>`;

                if (preds.length < 2) {
                    return html + '<div class="text-xs text-[#8b8d93]">No predictions available.</div></div>';
                }

                // current level + trend from the two predictions around now
                let i = preds.findIndex(p => p.t > now);
                if (i < 1) i = 1;
                const before = preds[i - 1], after = preds[Math.min(i, preds.length - 1)];
                const frac = after.t > before.t ? (now - before.t) / (after.t - before.t) : 0;
                const level = before.v + (after.v - before.v) * Math.max(0, Math.min(1, frac));
                const rising = after.v >= before.v;

                // next local extremum after now
                let extremum = null;
                for (let k = Math.max(i, 1); k < preds.length - 1; k++) {
                    const isMax = preds[k].v >= preds[k - 1].v && preds[k].v >= preds[k + 1].v;
                    const isMin = preds[k].v <= preds[k - 1].v && preds[k].v <= preds[k + 1].v;
                    if (preds[k].t > now && (isMax || isMin)) {
                        extremum = { ...preds[k], kind: isMax ? 'High' : 'Low' };
                        break;
                    }
                }
                const fmtTime = new Intl.DateTimeFormat(undefined, { weekday: 'short', hour: 'numeric', minute: '2-digit' });
                html += `<div class="text-xs text-white font-semibold">${(level * M_TO_FT).toFixed(1)} ft &middot; ${rising ? 'rising' : 'falling'}</div>`;
                if (extremum) {
                    html += `<div class="text-[11px] text-[#a7a9ae] mt-0.5">${extremum.kind} ${(extremum.v * M_TO_FT).toFixed(1)} ft at ${fmtTime.format(new Date(extremum.t))}</div>`;
                }

                // sparkline: last 24h observed (gray) + next 48h predicted (teal)
                const t0 = now - 24 * 3600e3, t1 = now + 48 * 3600e3;
                const window_ = { obs: obs.filter(p => p.t >= t0 && p.t <= now), preds: preds.filter(p => p.t >= t0 && p.t <= t1) };
                const all = window_.obs.concat(window_.preds);
                if (all.length > 1) {
                    const W = 250, H = 56, PAD = 4;
                    const vMin = Math.min(...all.map(p => p.v)), vMax = Math.max(...all.map(p => p.v));
                    const xOf = t => ((t - t0) / (t1 - t0)) * W;
                    const yOf = v => vMax === vMin ? H / 2 : PAD + (1 - (v - vMin) / (vMax - vMin)) * (H - 2 * PAD);
                    const line = pts => pts.map((p, j) => `${j ? 'L' : 'M'}${xOf(p.t).toFixed(1)} ${yOf(p.v).toFixed(1)}`).join(' ');
                    const nowX = xOf(now).toFixed(1);
                    html += `<svg width="${W}" height="${H}" class="mt-2" style="display:block;">
                        <line x1="${nowX}" y1="0" x2="${nowX}" y2="${H}" stroke="#5e6ad2" stroke-dasharray="3,3"/>
                        ${window_.obs.length > 1 ? `<path d="${line(window_.obs.filter((_, j) => j % 5 === 0))}" fill="none" stroke="#8b8d93" stroke-width="1"/>` : ''}
                        <path d="${line(window_.preds)}" fill="none" stroke="#15a3a3" stroke-width="1.5"/>
                        <circle cx="${nowX}" cy="${yOf(level).toFixed(1)}" r="2.5" fill="#fff"/>
                    </svg>
                    <div class="mono text-[9px] text-[#6f7177] mt-1">-24H &middot; NOW &middot; +48H</div>`;
                }
                return html + '</div>';
            }

            async function loadTideStations() {
                try {
                    const response = await fetch('/static/tides.json');
                    if (!response.ok) return; // older pipeline run: no tides
                    const payload = await response.json();
                    for (const st of payload.stations || []) {
                        if (typeof st.lat !== 'number' || typeof st.lon !== 'number') continue;
                        const el = document.createElement('div');
                        el.className = 'tide-marker';
                        el.title = `${st.name || st.id} tide station`;
                        const dot = document.createElement('div');
                        dot.className = 'tide-marker-dot';
                        el.appendChild(dot);

                        const popup = new maplibregl.Popup({ offset: 12, maxWidth: '300px' });
                        // Build the popup lazily so "now" is fresh on open
                        popup.on('open', () => popup.setHTML(tidePopupHTML(st)));
                        new maplibregl.Marker({ element: el })
                            .setLngLat([st.lon, st.lat])
                            .setPopup(popup)
                            .addTo(map);
                    }
                } catch (error) {
                    console.warn('Tide stations unavailable:', error);
                }
            }

            loadBuoyStations();
            loadTideStations();
        </script>
