{{ define "forecast" }}
<div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const isDarkMode = () => document.documentElement.classList.contains('dark');

            const getChartColors = () => {
                const darkMode = isDarkMode();
                return {
                    linePrimary: '#8f9bff',
                    lineSecondary: '#e2b86b',
                    lineTertiary: '#6fcf97',
                    lineQuaternary: '#b89cff',
                    axis: darkMode ? '#7f8187' : '#62646a',
                    verticalLine: '#5e6ad2'
                };
            };

            function displayClicked(date) {
                const dayData = dataGroupedByDay[date];
                if (!dayData) return;
                currentDay = dayData;

                const dateHeader = document.getElementById('date-header');
                const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
                
                const parts = date.split('-');
                const tempdate = new Date(parts[0], parts[1] - 1, parts[2]);

                dateHeader.textContent = days[tempdate.getDay()] + ' · ' + date;
                updateStripSelection(date);
                renderWindLane(date);
            }

            // --- Surface wind lane ---------------------------------------
            // 3-hourly wind at the station's nearest wave-model grid point,
            // served by /api/wind. Hidden when the run has no wind files.
            const WIND_STATION = "{{.SwellReport.StationId}}";
            let windSamples = []; // [{t: Date, s: m/s, d: from-degrees}]
            let windLaneDate = null;

            // Hourly wind for the selected day: a small amber curve with a
            // direction arrow at each 3-hourly sample.
            function renderWindLane(date) {
                windLaneDate = date;
                const lane = document.getElementById('windLane');
                const row = document.getElementById('windLaneRow');
                if (!lane || !row || !date || !windSamples.length) return;
                const parts = date.split('-');
                const dayStart = new Date(parts[0], parts[1] - 1, parts[2]).getTime();
                const dayPts = windSamples.filter(w =>
                    w.t.getTime() >= dayStart && w.t.getTime() < dayStart + 24 * 3600e3);
                if (dayPts.length < 2) {
                    lane.style.display = 'none';
                    return;
                }
                lane.style.display = '';
                row.innerHTML = '';
                const width = row.clientWidth || lane.clientWidth;
                const H = 76, top = 16, bottom = 16;
                const x = d3.scaleTime().domain([dayStart, dayStart + 24 * 3600e3]).range([12, width - 12]);
                const maxMph = d3.max(dayPts, w => w.s) * 2.237;
                const y = d3.scaleLinear().domain([0, Math.max(maxMph * 1.25, 5)]).range([H - bottom, top]);
                const svg = d3.select(row).append('svg').attr('width', width).attr('height', H);

                svg.append('line')
                    .attr('x1', 0).attr('x2', width)
                    .attr('y1', H - bottom).attr('y2', H - bottom)
                    .attr('stroke', '#2c2e33');
                for (const h of [0, 6, 12, 18, 24]) {
                    const tx = x(dayStart + h * 3600e3);
                    svg.append('text')
                        .attr('x', tx).attr('y', H - 4)
                        .attr('text-anchor', h === 0 ? 'start' : h === 24 ? 'end' : 'middle')
                        .attr('fill', '#6f7177').attr('font-size', 8)
                        .attr('font-family', "'JetBrains Mono', monospace")
                        .text(`${String(h % 24).padStart(2, '0')}:00`);
                }

                svg.append('path').datum(dayPts)
                    .attr('fill', 'none').attr('stroke', '#e2b86b').attr('stroke-width', 1.5)
                    .attr('d', d3.line().x(w => x(w.t)).y(w => y(w.s * 2.237)).curve(d3.curveMonotoneX));

                // an arrow per sample carries the direction; the peak is the
                // one labeled point
                const peak = dayPts.reduce((a, b) => (b.s > a.s ? b : a));
                for (const w of dayPts) {
                    const mph = (w.s * 2.237).toFixed(0);
                    const g = svg.append('g')
                        .attr('transform', `translate(${x(w.t)}, ${y(w.s * 2.237)})`);
                    g.append('circle').attr('r', 2).attr('fill', '#e2b86b');
                    g.append('path')
                        .attr('d', 'M0 -9 L2.6 -4.4 L1 -4.4 L1 2 L-1 2 L-1 -4.4 L-2.6 -4.4 Z')
                        .attr('fill', '#e2b86b')
                        .attr('transform', `rotate(${w.d + 180}) translate(0, -7)`)
                        .attr('opacity', 0.9);
                    g.append('title').text(`${mph} mph from ${Math.round(w.d)}°`);
                    if (w === peak) {
                        svg.append('text')
                            .attr('x', Math.max(16, Math.min(width - 16, x(w.t))))
                            .attr('y', Math.max(y(w.s * 2.237) - 14, 9))
                            .attr('text-anchor', 'middle')
                            .attr('fill', '#e2b86b').attr('font-size', 9)
                            .attr('font-family', "'JetBrains Mono', monospace")
                            .text(`${mph} mph`);
                    }
                }
            }

            async function loadWindForecast() {
                try {
                    const response = await fetch('/api/wind/' + encodeURIComponent(WIND_STATION));
                    if (!response.ok) return;
                    const payload = await response.json();
                    if (!payload.samples || !payload.samples.length) return;
                    let base = null;
                    if (payload.start) {
                        const [dPart, tPart] = payload.start.split('_');
                        base = new Date(Date.UTC(+dPart.slice(0, 4), +dPart.slice(4, 6) - 1, +dPart.slice(6, 8), +tPart.slice(0, 2)));
                    } else if (data.length) {
                        base = new Date(data[0].dateObj); // fall back to the bulletin run
                    }
                    if (!base || isNaN(base.getTime())) return;
                    windSamples = payload.samples.map(s => ({
                        t: new Date(base.getTime() + s.h * 3600e3),
                        s: s.s,
                        d: s.d,
                    }));
                    if (windLaneDate) renderWindLane(windLaneDate);
                    // redraw the strip so the wind lane appears
                    buildSwellStrip();
                    if (stripSelectedDate) updateStripSelection(stripSelectedDate);
                } catch (error) {
                    console.warn('Wind forecast unavailable:', error);
                }
            }
            loadWindForecast();

            function convertToDate(data, date) {
                hour = parseInt(data[0].Date.split(' ')[1]);
                firstdate = new Date(date.slice(0, 4), date.slice(4, 6) - 1, date.slice(6, 8), hour);
                firstdate.setHours(firstdate.getHours() - firstdate.getTimezoneOffset() / 60);
                for (i = 0; i < data.length; i++) {
                    data[i].dateObj = new Date(firstdate);
                    data[i].dateObj.setHours(data[i].dateObj.getHours() + i);
                    data[i].hour = data[i].dateObj.getHours();
                }
                return data;
            }

            function groupDataByDay(data) {
                data.sort((a, b) => a.dateObj - b.dateObj);
                const groupedData = {};
                data.forEach(item => {
                    const year = item.dateObj.getFullYear();
                    const month = (item.dateObj.getMonth() + 1).toString().padStart(2, '0');
                    const day = item.dateObj.getDate().toString().padStart(2, '0');
                    const dateKey = `${year}-${month}-${day}`;
                    if (!groupedData[dateKey]) {
                        groupedData[dateKey] = [];
                    }
                    groupedData[dateKey].push(item);
                });
                return groupedData;
            }

            let currentDay = [];
            let data = convertToDate({{json .ForecastData.Forecast}}, "{{.ForecastData.Date}}");
            let dataGroupedByDay = groupDataByDay(data);

            // --- Day cards -------------------------------------------------
            // Built client-side from the same local-day grouping the strip
            // uses, so the day columns line up by construction. (The server
            // buckets days in UTC, which drifted half a day for non-UTC
            // users and caused the strip/card misalignment.)
            const dayKeys = Object.keys(dataGroupedByDay).sort();
            const CONDITION_COLORS = { good: '#6fcf97', fair: '#e2b86b', poor: '#e06c75' };

            // mirrors determineCondition in main.go
            function conditionFor(avgFt) {
                if (avgFt < 0.5) return 'poor';
                if (avgFt < 1.5) return 'fair';
                return 'good';
            }

            const cardDayFmt = new Intl.DateTimeFormat(undefined, { weekday: 'short' });

            function buildDayCards() {
                const container = document.getElementById('forecastContainer');
                if (!container) return;
                container.innerHTML = '';
                for (const key of dayKeys) {
                    const heights = dataGroupedByDay[key]
                        .map(r => parseFloat(r.PrimaryWaveHeight))
                        .filter(Number.isFinite);
                    const avgFt = heights.length
                        ? (heights.reduce((a, b) => a + b, 0) / heights.length) * 3.28084
                        : 0;
                    const cond = conditionFor(avgFt);
                    const parts = key.split('-');
                    const d = new Date(parts[0], parts[1] - 1, parts[2]);
                    const card = document.createElement('div');
                    card.className = 'forecastcard text-white';
                    card.setAttribute('data-date', key);
                    card.innerHTML =
                        `<div class="fc-day">${cardDayFmt.format(d)} ${d.getMonth() + 1}/${d.getDate()}</div>` +
                        `<div class="fc-height">${avgFt.toFixed(1)}ft</div>` +
                        `<div class="fc-cond" style="color: ${CONDITION_COLORS[cond]};">${cond}</div>`;
                    container.appendChild(card);
                }
            }
            buildDayCards();

            // --- 16-day strip: swell height + wind speed lanes ------------
            // Two lanes on one shared day grid: swell (indigo, ft) on top,
            // wind (amber, mph) beneath. Hover reads out both; clicking
            // jumps to that day's hourly detail.
            const stripHost = document.getElementById('swellStrip');
            const stripReadout = document.getElementById('stripReadout');
            const stripPts = data.map(d => ({
                t: d.dateObj,
                ft: (parseFloat(d.PrimaryWaveHeight) || 0) * 3.28084,
            }));
            let stripSel = null;
            let stripX = null;
            let stripSelectedDate = null;

            function dateKeyOf(t) {
                return `${t.getFullYear()}-${String(t.getMonth() + 1).padStart(2, '0')}-${String(t.getDate()).padStart(2, '0')}`;
            }

            const stripTimeFmt = d3.timeFormat('%a %-d, %-I %p');
            const stripDayFmt = d3.timeFormat('%a %-d');

            function stripMono(sel, size, color) {
                return sel.attr('fill', color).attr('font-size', size)
                    .attr('font-family', "'JetBrains Mono', monospace");
            }

            function buildSwellStrip() {
                if (!stripHost || stripPts.length < 2 || !dayKeys.length) return;
                stripHost.innerHTML = '';
                const width = stripHost.clientWidth;
                if (width < 60) return;

                // Domain comes from the card day list itself, so both views
                // share one day grid.
                const p0 = dayKeys[0].split('-');
                const pN = dayKeys[dayKeys.length - 1].split('-');
                const domainStart = new Date(p0[0], p0[1] - 1, p0[2]);
                const domainEnd = new Date(new Date(pN[0], pN[1] - 1, pN[2]).getTime() + 24 * 3600e3);
                const x = d3.scaleTime().domain([domainStart, domainEnd]).range([0, width]);
                stripX = x;

                const windPts = windSamples.filter(w => w.t >= domainStart && w.t <= domainEnd);
                const hasWind = windPts.length > 1;

                // lane geometry: swell on top, wind beneath, labels at bottom
                const swTop = 14, swBase = 78;
                const wdTop = swBase + 16, wdBase = wdTop + 40;
                const gridBase = hasWind ? wdBase : swBase;
                const height = gridBase + 16;

                const maxFt = d3.max(stripPts, p => p.ft) || 1;
                const y = d3.scaleLinear().domain([0, maxFt * 1.2]).range([swBase, swTop]);

                const svg = d3.select(stripHost).append('svg')
                    .attr('width', width).attr('height', height);

                const grad = svg.append('defs').append('linearGradient')
                    .attr('id', 'stripFill').attr('x1', 0).attr('y1', 0).attr('x2', 0).attr('y2', 1);
                grad.append('stop').attr('offset', '0%').attr('stop-color', '#5e6ad2').attr('stop-opacity', 0.45);
                grad.append('stop').attr('offset', '100%').attr('stop-color', '#5e6ad2').attr('stop-opacity', 0.02);

                // selected-day band spans both lanes
                stripSel = svg.append('rect')
                    .attr('y', swTop - 6).attr('height', gridBase - swTop + 6)
                    .attr('fill', 'rgba(94, 106, 210, 0.16)').attr('display', 'none');

                // day grid: hairlines through both lanes, labels at the bottom
                const labelStep = width < 520 ? 4 : 2;
                const days = d3.timeDay.range(d3.timeDay.offset(d3.timeDay.floor(domainStart), 1), domainEnd);
                days.forEach((day, i) => {
                    svg.append('line')
                        .attr('x1', x(day)).attr('x2', x(day))
                        .attr('y1', swTop - 6).attr('y2', gridBase + 4)
                        .attr('stroke', 'rgba(255, 255, 255, 0.05)');
                    if (i % labelStep === 1) {
                        stripMono(svg.append('text'), 9, '#6f7177')
                            .attr('x', Math.max(18, Math.min(width - 18, x(day))))
                            .attr('y', height - 4)
                            .attr('text-anchor', 'middle')
                            .text(stripDayFmt(day));
                    }
                });
                for (const baseline of hasWind ? [swBase, wdBase] : [swBase]) {
                    svg.append('line')
                        .attr('x1', 0).attr('x2', width)
                        .attr('y1', baseline).attr('y2', baseline)
                        .attr('stroke', '#3b3d42');
                }

                // swell lane
                svg.append('path').datum(stripPts)
                    .attr('fill', 'url(#stripFill)')
                    .attr('d', d3.area().x(p => x(p.t)).y0(swBase).y1(p => y(p.ft)).curve(d3.curveMonotoneX));
                svg.append('path').datum(stripPts)
                    .attr('fill', 'none').attr('stroke', '#8f9bff').attr('stroke-width', 1.5)
                    .attr('d', d3.line().x(p => x(p.t)).y(p => y(p.ft)).curve(d3.curveMonotoneX));

                const peak = stripPts.reduce((a, b) => (b.ft > a.ft ? b : a));
                svg.append('circle')
                    .attr('cx', x(peak.t)).attr('cy', y(peak.ft)).attr('r', 2.5)
                    .attr('fill', '#fff');
                stripMono(svg.append('text'), 10, '#e6e6e6')
                    .attr('x', Math.max(24, Math.min(width - 24, x(peak.t))))
                    .attr('y', Math.max(y(peak.ft) - 6, 10))
                    .attr('text-anchor', 'middle')
                    .text(`${peak.ft.toFixed(1)} ft`);

                // wind lane
                let yw = null;
                if (hasWind) {
                    const maxMph = d3.max(windPts, w => w.s) * 2.237;
                    yw = d3.scaleLinear().domain([0, Math.max(maxMph * 1.25, 5)]).range([wdBase, wdTop]);
                    stripMono(svg.append('text'), 8, '#6f7177')
                        .attr('x', 2).attr('y', wdTop - 5)
                        .text('WIND (MPH)');
                    svg.append('path').datum(windPts)
                        .attr('fill', 'none').attr('stroke', '#e2b86b').attr('stroke-width', 1.5)
                        .attr('d', d3.line().x(w => x(w.t)).y(w => yw(w.s * 2.237)).curve(d3.curveMonotoneX));
                    const windPeak = windPts.reduce((a, b) => (b.s > a.s ? b : a));
                    svg.append('circle')
                        .attr('cx', x(windPeak.t)).attr('cy', yw(windPeak.s * 2.237)).attr('r', 2)
                        .attr('fill', '#e2b86b');
                    stripMono(svg.append('text'), 9, '#e2b86b')
                        .attr('x', Math.max(28, Math.min(width - 28, x(windPeak.t))))
                        .attr('y', Math.max(yw(windPeak.s * 2.237) - 5, wdTop + 8))
                        .attr('text-anchor', 'middle')
                        .text(`${(windPeak.s * 2.237).toFixed(0)} mph`);
                }

                const crosshair = svg.append('line')
                    .attr('y1', swTop - 6).attr('y2', gridBase)
                    .attr('stroke', '#6f7177').attr('stroke-dasharray', '3,3').attr('display', 'none');

                const bisect = d3.bisector(p => p.t).center;
                const windBisect = d3.bisector(w => w.t).center;
                svg.append('rect')
                    .attr('width', width).attr('height', height)
                    .attr('fill', 'none').attr('pointer-events', 'all')
                    .style('cursor', 'pointer')
                    .on('mousemove', (event) => {
                        const [mx] = d3.pointer(event);
                        const t = x.invert(mx);
                        const p = stripPts[bisect(stripPts, t)];
                        crosshair.attr('x1', x(p.t)).attr('x2', x(p.t)).attr('display', null);
                        let text = `${stripTimeFmt(p.t)} · ${p.ft.toFixed(1)} ft`;
                        if (hasWind) {
                            const w = windPts[windBisect(windPts, t)];
                            text += ` · ${(w.s * 2.237).toFixed(0)} mph`;
                        }
                        stripReadout.textContent = text;
                        stripReadout.style.color = '#c8ceff';
                    })
                    .on('mouseleave', () => {
                        crosshair.attr('display', 'none');
                        stripReadout.textContent = 'Select a day for hourly detail';
                        stripReadout.style.color = '';
                    })
                    .on('click', (event) => {
                        const [mx] = d3.pointer(event);
                        const p = stripPts[bisect(stripPts, x.invert(mx))];
                        const card = document.querySelector(`.forecastcard[data-date="${dateKeyOf(p.t)}"]`);
                        if (card) card.click();
                    });
            }

            function updateStripSelection(date) {
                stripSelectedDate = date;
                if (!stripSel || !stripX) return;
                const parts = date.split('-');
                const start = new Date(parts[0], parts[1] - 1, parts[2]);
                const end = new Date(start.getTime() + 24 * 60 * 60 * 1000);
                const x0 = Math.max(0, stripX(start));
                const x1 = Math.min(stripX.range()[1], stripX(end));
                stripSel.attr('x', x0).attr('width', Math.max(0, x1 - x0)).attr('display', null);
            }
            buildSwellStrip();

            const cards = document.querySelectorAll('.forecastcard');
            const firstCard = cards[0];

            const margin = {top: 10, right: 12, bottom: 24, left: 34},
                width = document.getElementById('chart-container').clientWidth - margin.left - margin.right,
                height = 220 - margin.top - margin.bottom;

            const svg = d3.select("#chart")
                .append("svg")
                .attr("width", width + margin.left + margin.right)
                .attr("height", height + margin.top + margin.bottom)
                .attr("viewBox", `0 0 ${width + margin.left + margin.right} ${height + margin.top + margin.bottom}`)
                .attr("preserveAspectRatio", "none")
                .append("g")
                .attr("transform", `translate(${margin.left},${margin.top})`);

            const x = d3.scaleLinear()
                .domain([0, 23])
                .range([ 0, width ]);
            const xAxisGroup = svg.append("g")
                .attr("class", "xaxis")
                .attr("transform", `translate(0,${height})`)
                .call(d3.axisBottom(x).tickValues([0, 6, 12, 18, 23]).tickFormat(d => `${String(d).padStart(2, '0')}:00`).tickSize(4).tickSizeOuter(0).tickPadding(6));

            var y = d3.scaleLinear()
                .range([ height, 0 ]);

            var yScale = d3.scaleLinear()
                .range([ height, 0 ]);

            var yAxis = d3.axisLeft(yScale).ticks(3)
                .tickFormat(d => `${d % 1 ? d.toFixed(1) : d.toFixed(0)}′`)
                .tickSize(-width).tickSizeOuter(0).tickPadding(6);

            const yAxisGroup = svg.append("g")
                .attr("class", "yaxis")
                .call(yAxis);

            const setAxisColor = () => {
                const colors = getChartColors();
                svg.selectAll(".yaxis, .xaxis").selectAll("text").style("fill", colors.axis);
                svg.selectAll(".xaxis").selectAll("path, line").style("stroke", '#45474d');
                svg.selectAll(".yaxis").selectAll("path").style("stroke", 'none');
                svg.selectAll(".yaxis").selectAll("line").style("stroke", '#34363b');
            };
            setAxisColor();

            function updateChart(data, svg) {
                if (!data || data.length === 0) return;
                
                let chartColors = getChartColors();
                svg.selectAll(".vertical-line").remove();
                svg.selectAll(".overlay").remove();
                
                const maxWaveHeight = d3.max(data, d => Math.max(d.PrimaryWaveHeight, d.SecondaryWaveHeight, d.TertiaryWaveHeight, d.QuaternaryWaveHeight)) * 3.28084;
                y.domain([0, maxWaveHeight]);
                yScale.domain([0, maxWaveHeight]);
                // dedupe ticks that would render identical labels
                yAxis.tickValues([...new Set(yScale.ticks(3).map(v => +v.toFixed(1)))]);
                svg.select(".yaxis").transition().duration(200).call(yAxis);
                setAxisColor();

                const linePrimary = d3.line().x(d => x(d.hour)).y(d => y(d.PrimaryWaveHeight * 3.28084)).curve(d3.curveMonotoneX);
                const lineSecondary = d3.line().x(d => x(d.hour)).y(d => y(d.SecondaryWaveHeight * 3.28084)).curve(d3.curveMonotoneX);
                const lineTertiary = d3.line().x(d => x(d.hour)).y(d => y(d.TertiaryWaveHeight * 3.28084)).curve(d3.curveMonotoneX);
                const lineQuaternary = d3.line().x(d => x(d.hour)).y(d => y(d.QuaternaryWaveHeight * 3.28084)).curve(d3.curveMonotoneX);

                svg.selectAll(".linePrimary").data([data]).join("path").attr("class", "linePrimary").attr("d", linePrimary).attr("fill", "none").attr("stroke-width", 1.5).attr("stroke", chartColors.linePrimary);
                svg.selectAll(".lineSecondary").data([data]).join("path").attr("class", "lineSecondary").attr("d", lineSecondary).attr("fill", "none").attr("stroke-width", 1.25).attr("stroke", chartColors.lineSecondary);
                svg.selectAll(".lineTertiary").data([data]).join("path").attr("class", "lineTertiary").attr("d", lineTertiary).attr("fill", "none").attr("stroke-width", 1).attr("stroke", chartColors.lineTertiary);
                svg.selectAll(".lineQuaternary").data([data]).join("path").attr("class", "lineQuaternary").attr("d", lineQuaternary).attr("fill", "none").attr("stroke-width", 1).attr("stroke", chartColors.lineQuaternary);

                svg.selectAll(".primaryPoint").data(data).join("path").attr("class", "primaryPoint").attr("transform", d => `translate(${x(d.hour)},${y(d.PrimaryWaveHeight * 3.28084)}) rotate(${d.PrimaryDegrees - 135})`).attr("d", d3.symbol().type(d3.symbolTriangle).size(28)).attr("fill", chartColors.linePrimary);
                svg.selectAll(".secondaryPoint").data(data).join("path").attr("class", "secondaryPoint").attr("transform", d => `translate(${x(d.hour)},${y(d.SecondaryWaveHeight * 3.28084)}) rotate(${d.SecondaryDegrees - 135})`).attr("d", d3.symbol().type(d3.symbolTriangle).size(24)).attr("fill", chartColors.lineSecondary);
                svg.selectAll(".tertiaryPoint").data(data).join("path").attr("class", "tertiaryPoint").attr("transform", d => `translate(${x(d.hour)},${y(d.TertiaryWaveHeight * 3.28084)}) rotate(${d.TertiaryDegrees - 135})`).attr("d", d3.symbol().type(d3.symbolTriangle).size(20)).attr("fill", chartColors.lineTertiary);
                svg.selectAll(".quaternaryPoint").data(data).join("path").attr("class", "quaternaryPoint").attr("transform", d => `translate(${x(d.hour)},${y(d.QuaternaryWaveHeight * 3.28084)}) rotate(${d.QuaternaryDegrees - 135})`).attr("d", d3.symbol().type(d3.symbolTriangle).size(20)).attr("fill", chartColors.lineQuaternary);

                const tooltip = d3.select("#tooltip");
                const verticalLine = svg.append("line").attr("class", "vertical-line").attr("y1", 0).attr("y2", height).attr("stroke", chartColors.verticalLine).attr("stroke-width", 1).attr("stroke-dasharray", "5,5").style("opacity", 0);
                svg.append("rect").attr("class", "overlay").attr("width", width).attr("height", height).style("fill", "none").style("pointer-events", "all");

                svg.on("mousemove", (event) => {
                    const mousePos = d3.pointer(event);
                    const mouseX = Math.max(0, Math.min(width, mousePos[0]));
                    verticalLine.attr("x1", mouseX).attr("x2", mouseX).style("opacity", 1);
                    const hoverDate = x.invert(mouseX);
                    const closestData = data.reduce((prev, curr) => (Math.abs(curr.hour - hoverDate) < Math.abs(prev.hour - hoverDate) ? curr : prev));
                    const formattedHour = `${closestData.hour.toString().padStart(2, '0')}:00`;
                    const createArrowHTML = (direction, color) => `<span style="display: inline-block; color: ${color}; transform: rotate(${direction - 180}deg); margin-right: 5px;">&#8595;</span>`;
                    tooltip.style("visibility", "visible").style("top", (event.pageY + 15) + "px").style("left", (event.pageX + 15) + "px")
                        .html(`<strong>${formattedHour}</strong><br>
                            <span style="color: ${chartColors.linePrimary};">${createArrowHTML(closestData.PrimaryDegrees, chartColors.linePrimary)} ${(closestData.PrimaryWaveHeight * 3.28084).toFixed(1)}ft at ${closestData.PrimaryPeriod}s</span><br>
                            <span style="color: ${chartColors.lineSecondary};">${createArrowHTML(closestData.SecondaryDegrees, chartColors.lineSecondary)} ${(closestData.SecondaryWaveHeight * 3.28084).toFixed(1)}ft at ${closestData.SecondaryPeriod}s</span><br>
                            <span style="color: ${chartColors.lineTertiary};">${createArrowHTML(closestData.TertiaryDegrees, chartColors.lineTertiary)} ${(closestData.TertiaryWaveHeight * 3.28084).toFixed(1)}ft at ${closestData.TertiaryPeriod}s</span><br>
                            <span style="color: ${chartColors.lineQuaternary};">${createArrowHTML(closestData.QuaternaryDegrees, chartColors.lineQuaternary)} ${(closestData.QuaternaryWaveHeight * 3.28084).toFixed(1)}ft at ${closestData.QuaternaryPeriod}s</span>`);
                });

                svg.on("mouseleave", () => {
                    tooltip.style("visibility", "hidden");
                    verticalLine.style("opacity", 0);
                });
            }

            cards.forEach(card => {
                card.addEventListener('click', function() {
                    cards.forEach(c => c.classList.remove('selectedforecast'));
                    this.classList.add('selectedforecast');
                    const date = this.getAttribute('data-date');
                    displayClicked(date);
                    updateChart(currentDay, svg);
                });
            });

            if (firstCard) {
                firstCard.classList.add('selectedforecast');
                const date = firstCard.getAttribute('data-date');
                displayClicked(date);
                updateChart(currentDay, svg);
            }

            const observer = new MutationObserver(() => {
                updateChart(currentDay, svg);
            });
            observer.observe(document.documentElement, { attributes: true, attributeFilter: ['class'] });
        });
    </script>

    <style>
        .swell-strip { margin-top: 12px; background: #202125; border: 1px solid #34363b; }
        .swell-strip .strip-title, .swell-strip #stripReadout { font-family: 'JetBrains Mono', monospace; }
        .swell-strip svg { display: block; }
        /* One equal-width column per forecast day, so the cards line up
           with the strip's day grid above. Narrow screens scroll. */
        #forecastContainer {
            display: grid;
            grid-auto-flow: column;
            grid-auto-columns: minmax(48px, 1fr);
            gap: 2px;
            margin-top: 2px;
            overflow-x: auto;
            scrollbar-width: thin;
            scrollbar-color: #45474d transparent;
        }
        .forecastcard {
            min-width: 0;
            padding: 6px 2px;
            background: #202125;
            border: 1px solid #34363b;
            cursor: pointer;
            text-align: center;
            transition: border-color 120ms ease, background 120ms ease;
        }
        .forecastcard:hover { background: #292a2f; }
        .forecastcard.selectedforecast { background: #292a35; border-color: #5e6ad2; }
        .forecastcard .fc-day {
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px;
            color: #8b8d93;
            white-space: nowrap;
        }
        .forecastcard .fc-height { font-size: 11px; font-weight: 600; margin-top: 3px; white-space: nowrap; }
        .forecastcard .fc-cond {
            font-size: 8px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            margin-top: 2px;
        }
        .swell-detail {
            margin-top: 14px;
            padding: 10px 10px 6px;
            background: #202125;
            border: 1px solid #34363b;
        }
        .swell-detail-heading, #date-header, .swell-legend { font-family: 'JetBrains Mono', monospace; }
        #chart-container { width: 100%; min-width: 0; }
        #chart, #chart svg { display: block; width: 100%; }
        #chart svg { max-height: 220px; }
        /* The svg can be CSS-stretched from its drawn size; keep hairlines
           1px and pixel-snapped so gridlines don't blur or drift. */
        #chart .xaxis line, #chart .xaxis .domain, #chart .yaxis line {
            shape-rendering: crispEdges;
            vector-effect: non-scaling-stroke;
        }
        #chart text { font-family: 'JetBrains Mono', monospace; font-size: 8px; }
        .wind-lane-row { margin-top: 4px; }
        .wind-lane-row svg { display: block; width: 100%; }
        .swell-legend { display: flex; flex-wrap: wrap; gap: 5px 12px; margin-top: 6px; color: #8b8d93; font-size: 8px; text-transform: uppercase; }
        .swell-legend span { display: inline-flex; align-items: center; gap: 4px; }
        .swell-legend i { width: 7px; height: 7px; display: inline-block; transform: rotate(45deg); }
        #tooltip {
            z-index: 20;
            padding: 7px 9px;
            background: #18191c;
            border: 1px solid #45474d;
            border-radius: 0;
            color: #e6e6e6;
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px;
            line-height: 1.65;
            box-shadow: 0 8px 24px rgba(0,0,0,.35);
        }
        @media (max-width: 520px) {
            .swell-detail { padding-inline: 6px; }
            #chart svg { max-height: 190px; }
            .swell-legend { gap: 4px 8px; }
        }
    </style>

    <!-- 16-day outlook: swell height strip with one day card per column
         directly beneath, sharing the same day grid -->
    <div class="swell-strip">
        <div class="flex items-center justify-between px-3 pt-2">
            <span class="strip-title text-[10px] font-semibold uppercase text-[#8b8d93]">Swell &amp; wind &middot; 16 day outlook</span>
            <span id="stripReadout" class="text-[10px] text-[#8b8d93]">Select a day for hourly detail</span>
        </div>
        <div id="swellStrip"></div>
    </div>
    <!-- Day cards are generated client-side (buildDayCards) from the same
         local-day grouping the strip uses, so the columns always align -->
    <div id="forecastContainer"></div>
    <div class="swell-detail">
        <div class="flex flex-wrap items-start justify-between gap-x-4 gap-y-1 px-1">
            <div>
                <div class="swell-detail-heading text-[9px] font-semibold uppercase tracking-wide text-[#7f8187]">Hourly swell · height & direction</div>
                <div id="date-header" class="mt-1 text-[10px] font-semibold text-white"></div>

                <span><i style="background:#8f9bff"></i>Primary</span>
                <span><i style="background:#e2b86b"></i>Secondary</span>
                <span><i style="background:#6fcf97"></i>Tertiary</span>

        <div id="windLane" style="display: none;">
            <div class="swell-detail-heading text-[9px] font-semibold uppercase tracking-wide text-[#7f8187] px-1 mt-3">Surface wind</div>
            <div id="windLaneRow" class="wind-lane-row"></div>
        </div>
    </div>

    <div class="h-8"></div>

</div>
